<!DOCTYPE html>
<html>
<head>
<title>Echoes in Envelopes 💌</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  color: white;
  background: linear-gradient(to bottom, #ffb7a5, #ff8fab, #7a6c9d, #3a3d5c);
  min-height: 100vh;
  text-align: center;
}

/* Header */
h1 {
  margin-top: 40px;
}

p {
  opacity: 0.8;
}

/* Grid */
.grid {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 20px;
  padding: 30px;
}

/* Envelope button */
.box {
  width: 150px;
  height: 100px;
  background: rgba(0,0,0,0.3);
  border-radius: 15px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
}

/* Letter area */
#letter {
  display: none;
  margin: 20px auto;
  padding: 20px;
  width: 80%;
  max-width: 400px;
  background: white;
  color: black;
  border-radius: 15px;
}

.top-banner {
  width: 100%;
  background: linear-gradient(to right, rgba(122,108,157,0.85), rgba(255,143,171,0.75));
  padding: 35px 10px 25px;
  text-align: center;
  backdrop-filter: blur(12px);
}

.top-banner h1 {
  margin: 0;
  font-size: 2.5rem;
}

.top-banner p {
  margin-top: 8px;
  opacity: 0.9;
}  
</style>

</head>

<body>

<div class="top-banner">
  <h1>Echoes in Envelopes 💌</h1>
  <p>letters written on the 22nd</p>
</div>

<div class="grid">
  <div class="box" onclick="showLetter('April 22: Your first letter 💗')">April 22</div>
  <div class="box" onclick="showLetter('May 22: Another memory 💗')">May 22</div>
  <div class="box" onclick="showLetter('June 22: Something sweet 💗')">June 22</div>
</div>

<div id="letter"></div>

<script>
function showLetter(text) {
  var box = document.getElementById("letter");
  box.style.display = "block";
  box.innerHTML = text;
}
</script>

</body>
</html>
