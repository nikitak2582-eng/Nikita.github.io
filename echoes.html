<!DOCTYPE html>
<html>
<head>
<title>Echoes in Envelopes 💌</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

html, body {
  margin: 0;
  padding: 0;
}

/* 🌿 DESK BACKGROUND */
body {
  font-family: 'Georgia', serif;
  color: #4a2c1f;

  background:
    linear-gradient(rgba(30,15,8,0.2), rgba(30,15,8,0.3)),
    url("desk.jpg") center/cover fixed no-repeat;
}

/* 🌿 HEADER */
.top-banner {
  padding: 50px 20px 30px;
  background:
    linear-gradient(rgba(245,224,190,0.75), rgba(225,190,145,0.75)),
    url("paper.jpg") center/cover;
  border-bottom: 1px solid rgba(90,50,30,0.2);
}

.top-banner h1 {
  font-size: 3rem;
  margin: 0;
  font-family: 'Playfair Display', serif;
}

.top-banner p {
  max-width: 600px;
  margin-top: 10px;
  font-size: 0.95rem;
}

/* 🌿 MAIN PANEL (NO GREY BG) */
.main-panel {
  max-width: 1150px;
  margin: 30px auto;
  padding: 20px;
}

/* 🌿 LETTER GRID */
.grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 28px;
}

/* 🌿 ENVELOPE CARDS */
.card {
  position: relative;
  min-height: 180px;
  padding: 18px;
  cursor: pointer;
  border-radius: 10px;

  background:
    linear-gradient(rgba(240,214,178,.15), rgba(222,190,146,.2)),
    url("envelope.png") center/140% no-repeat;

  border: 1px solid rgba(99,55,30,.25);
  box-shadow: 0 12px 25px rgba(0,0,0,.35);
  transition: 0.25s;
}

.card:hover {
  transform: translateY(-5px) scale(1.02);
}

/* TEXT */
.card .date {
  font-size: 1.3rem;
  font-family: 'Dancing Script', cursive;
  color: #8a3d2f;
}

.card .sub {
  font-size: 0.8rem;
  margin-top: 5px;
}

/* STAMPS */
.stamp {
  position: absolute;
  top: 10px;
  right: 10px;
  width: 38px;
  opacity: 0.9;
}

/* 🌿 LETTER VIEW */
#letter {
  display: none;
  margin: 40px auto 0;
  max-width: 950px;
  min-height: 420px;
  border-radius: 10px;
  overflow: hidden;

  background:
    linear-gradient(rgba(255,236,200,0.45), rgba(232,200,160,0.5)),
    url("postcard.png") center/cover no-repeat;

  box-shadow: 0 25px 60px rgba(0,0,0,0.45);
  border: 1px solid rgba(80,45,25,0.3);

  position: relative;
  padding: 40px;
}

/* TEXT INSIDE LETTER */
#letter-content {
  max-width: 60%;
  line-height: 1.6;
}

/* DECOR */
.kiss {
  position: absolute;
  bottom: 25px;
  left: 40px;
  width: 90px;
  opacity: 0.6;
}

.wax {
  position: absolute;
  bottom: -20px;
  left: 50%;
  transform: translateX(-50%);
  width: 80px;
}

</style>
</head>

<body>

<div class="top-banner">
  <h1>Echoes in Envelopes 💌</h1>
  <p>Some feelings are meant to be written, not forgotten.</p>
</div>

<div class="main-panel">

  <div class="grid">

    <div class="card" onclick="showLetter('may22')">
      <div class="date">22 May 2025</div>
      <div class="sub">Delivered to future ♡</div>
      <img src="stamp1.png" class="stamp">
    </div>

    <div class="card" onclick="showLetter('apr22')">
      <div class="date">22 Apr 2025</div>
      <div class="sub">Delivered to future ♡</div>
      <img src="stamp2.png" class="stamp">
    </div>

    <div class="card" onclick="showLetter('mar22')">
      <div class="date">22 Mar 2025</div>
      <div class="sub">Delivered to future ♡</div>
      <img src="stamp1.png" class="stamp">
    </div>

  </div>

  <!-- LETTER VIEW -->
  <div id="letter">
    <div id="letter-content"></div>

    <img src="kiss.png" class="kiss">
    <img src="wax.png" class="wax">
  </div>

</div>

<script>
function showLetter(id) {
  const box = document.getElementById("letter");
  const content = document.getElementById("letter-content");

  // TEMP CONTENT (replace later with Firebase)
  content.innerHTML = `
    <h2>22 May 2025</h2>
    <p>
    Another 22nd, another piece of my heart I give to you.<br><br>
    Some days are heavier than others, but knowing you're mine makes everything feel a little lighter.<br><br>
    Forever yours, always.
    </p>
  `;

  box.style.display = "block";
  box.scrollIntoView({ behavior: "smooth" });
}
</script>

</body>
</html>
