<!DOCTYPE html>
<html>
<head>
<title>Echoes in Envelopes 💌</title>

<style>
html, body {
  margin: 0;
  padding: 0;
  font-family: 'Segoe UI', sans-serif;
  color: white;
  height: 100%;
}

/* 🌇 FULL FIXED BACKGROUND */
body {
  background: linear-gradient(to bottom, #ffb7a5, #ff8fab, #7a6c9d, #3a3d5c);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

/* wrapper */
.page {
  flex: 1;
}

/* 💖 Header */
.header {
  text-align: center;
  padding: 40px 20px;
}

.header h1 {
  margin: 0;
  font-size: 2.4rem;
}

.header p {
  opacity: 0.85;
}

/* 📩 Grid */
.grid {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 20px;
  padding: 20px;
}

/* 📩 Envelope cards */
.envelope {
  width: 160px;
  height: 110px;
  background: rgba(122,108,157,0.35);
  backdrop-filter: blur(12px);
  border-radius: 15px;
  position: relative;
  cursor: pointer;
  transition: 0.3s;
}

.envelope:hover {
  transform: translateY(-5px);
}

/* ✉️ flap */
.envelope::before {
  content: "";
  position: absolute;
  top: 0;
  left: 0;
  border-left: 80px solid transparent;
  border-right: 80px solid transparent;
  border-bottom: 55px solid rgba(255,255,255,0.2);
}

/* 📅 label */
.label {
  position: absolute;
  bottom: 10px;
  width: 100%;
  text-align: center;
  font-size: 0.95rem;
  color: #f5f0ff; /* FIXED COLOR */
}

/* 💌 LETTER MODAL */
.modal {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.6);
  display: none;
  justify-content: center;
  align-items: center;
}

/* 💌 letter */
.letter {
  width: 80%;
  max-width: 400px;
  background: #fff;
  color: #333;
  padding: 25px;
  border-radius: 15px;
  transform: scale(0.5);
  opacity: 0;
  transition: 0.4s;
}

/* open animation */
.modal.show .letter {
  transform: scale(1);
  opacity: 1;
}

/* close btn */
.close {
  margin-top: 15px;
  display: inline-block;
  cursor: pointer;
  color: #7a6c9d;
}
</style>

</head>

<body>

<div class="page">

<!-- 💖 Header -->
<div class="header">
  <h1>Echoes in Envelopes 💌</h1>
  <p>letters written on the 22nd</p>
</div>

<!-- 📩 Grid -->
<div class="grid">

  <div class="envelope" onclick="openLetter('April 22 💗')">
    <div class="label">April 22</div>
  </div>

  <div class="envelope" onclick="openLetter('May 22 💗')">
    <div class="label">May 22</div>
  </div>

  <div class="envelope" onclick="openLetter('June 22 💗')">
    <div class="label">June 22</div>
  </div>

  <div class="envelope" onclick="openLetter('July 22 💗')">
    <div class="label">July 22</div>
  </div>

</div>

</div>

<!-- 💌 Modal -->
<div class="modal" id="modal">
  <div class="letter" id="letterBox">
    <div id="letterText">Your letter goes here 💌</div>
    <div class="close" onclick="closeLetter()">close</div>
  </div>
</div>

<script>
function openLetter(text) {
  document.getElementById("modal").style.display = "flex";
  document.getElementById("letterText").innerText = text;
  setTimeout(() => {
    document.getElementById("modal").classList.add("show");
  }, 10);
}

function closeLetter() {
  document.getElementById("modal").classList.remove("show");
  setTimeout(() => {
    document.getElementById("modal").style.display = "none";
  }, 300);
}
</script>

</body>
</html>
