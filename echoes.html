<!DOCTYPE html>
<html>
<head>
<title>Echoes in Envelopes 💌</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

/* ---------- PRELOADER ---------- */
#loader {
  position: fixed;
  inset: 0;
  background: #2f1f14;
  display: flex;
  justify-content: center;
  align-items: center;
  color: #fff3e6;
  font-family: Georgia;
  z-index: 9999;
}
body.loaded #loader { display:none; }

/* ---------- BASE ---------- */
html,body{
  margin:0;
  padding:0;
  background:#2f1f14;
}

body{
  font-family: Georgia, serif;
  color:#3e2a1f;

  background:
    linear-gradient(rgba(0,0,0,.25), rgba(0,0,0,.25)),
    url("desk.jpg");

  background-size: cover;
  background-attachment: fixed;
}

/* ---------- SHEET ---------- */
.archive-sheet{
  position:relative;
  margin:30px;
  padding:30px;
  border-radius:20px;

  background:
    linear-gradient(rgba(255,245,230,.88), rgba(255,245,230,.88)),
    url("paper.jpg");

  background-size:cover;

  box-shadow:0 20px 60px rgba(0,0,0,.4);
}

/* ---------- TITLE ---------- */
h1{
  font-size:42px;
  margin-bottom:20px;
}

/* ---------- GRID ---------- */
.grid{
  display:grid;
  grid-template-columns: repeat(auto-fit, minmax(260px,1fr));
  gap:25px;
}

/* ---------- ENVELOPE ---------- */
.envelope{
  position:relative;
  height:170px;
  border-radius:16px;
  cursor:pointer;

  background:
    linear-gradient(rgba(255,240,220,.78), rgba(255,240,220,.78)),
    url("paper.jpg");

  box-shadow:0 12px 30px rgba(0,0,0,.25);
  overflow:hidden;
  transition:.4s;
}

.envelope:hover{
  transform:translateY(-6px) scale(1.02);
}

/* flap */
.envelope::before{
  content:"";
  position:absolute;
  width:100%;
  height:100%;
  background:linear-gradient(135deg,#e6d2b8,#cdb296);
  clip-path:polygon(0 0,100% 0,50% 60%);
  opacity:.7;
}

/* wax seal */
.seal{
  position:absolute;
  top:68px;
  left:50%;
  transform:translateX(-50%);
  width:55px;
}

/* date */
.date{
  position:absolute;
  bottom:30px;
  width:100%;
  text-align:center;
  font-size:20px;
  color:#7a1f1f;
  font-weight:bold;
}

/* ---------- KISS MARKS ---------- */
.kiss-mark{
  position:absolute;
  width:90px;
  height:90px;
  background:url("kissmark.png") center/contain no-repeat;
  opacity:.35;
  pointer-events:none;
}

/* ---------- POSTCARD ---------- */
#postcard{
  display:none;
  margin-top:40px;

  background:
    linear-gradient(rgba(255,245,230,.95), rgba(255,245,230,.95)),
    url("paper.jpg");

  border-radius:20px;
  padding:25px;
  box-shadow:0 20px 60px rgba(0,0,0,.4);
}

/* ---------- LETTER POPUP ---------- */
#letterPopup{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.5);
  display:none;
  justify-content:center;
  align-items:center;
  z-index:999;
}

.letter-box{
  width:500px;
  padding:30px;
  border-radius:18px;

  background:
    linear-gradient(rgba(255,245,230,.95), rgba(255,245,230,.95)),
    url("paper.jpg");

  box-shadow:0 20px 60px rgba(0,0,0,.5);
  animation:openLetter .5s ease;
}

@keyframes openLetter{
  from{ transform:scale(.7) rotate(-5deg); opacity:0; }
  to{ transform:scale(1) rotate(0); opacity:1; }
}

.close{
  float:right;
  cursor:pointer;
}

/* ---------- BUTTON ---------- */
.open-btn{
  margin-top:15px;
  display:inline-block;
  padding:8px 16px;
  background:#7a1f1f;
  color:white;
  border-radius:20px;
  cursor:pointer;
}

</style>
</head>

<body>

<div id="loader">opening your letters… 💌</div>

<div class="archive-sheet">

<h1>Echoes in Envelopes</h1>

<div class="grid">

<div class="envelope" onclick="openLetter('22 April 2026')">
  <img src="waxseal.png" class="seal">
  <div class="date">22 April 2026</div>
</div>

<div class="envelope" onclick="openLetter('22 May 2026')">
  <img src="waxseal.png" class="seal">
  <div class="date">22 May 2026</div>
</div>

<div class="envelope" onclick="openLetter('22 June 2026')">
  <img src="waxseal.png" class="seal">
  <div class="date">22 June 2026</div>
</div>

</div>

<!-- 💋 kisses -->
<div class="kiss-mark" style="top: 28px; left: 335px;"></div>
<div class="kiss-mark" style="right: 36px; bottom: 34px; transform: rotate(7deg); opacity:.28;"></div>
<div class="kiss-mark" style="top: 140px; right: 160px; transform: rotate(15deg);"></div>
<div class="kiss-mark" style="bottom: 120px; left: 280px; transform: rotate(-10deg); opacity:.3;"></div>
<div class="kiss-mark" style="top: 60%; left: 10%; transform: rotate(5deg); opacity:.25;"></div>

<!-- POSTCARD -->
<div id="postcard">
  <h2 id="postcardDate"></h2>
  <p>Delivered to future ♡</p>
  <div class="open-btn" onclick="showFullLetter()">read it softly ♡</div>
  <p style="margin-top:20px; color:#7a1f1f;">forever & always.</p>
</div>

</div>

<!-- FULL LETTER -->
<div id="letterPopup">
  <div class="letter-box">
    <div class="close" onclick="closeLetter()">✕</div>
    <h3 id="fullDate"></h3>
    <p>
      Another 22nd… another piece of my heart I leave for you.
      <br><br>
      If you're reading this someday,
      I hope you feel me here.
    </p>
  </div>
</div>

<script>

/* PRELOADER */
window.onload = () => document.body.classList.add("loaded");

/* OPEN ENVELOPE */
function openLetter(date){
  document.getElementById("postcard").style.display="block";
  document.getElementById("postcardDate").innerText=date;
  window.scrollTo({top:document.body.scrollHeight, behavior:"smooth"});
}

/* SHOW FULL LETTER */
function showFullLetter(){
  document.getElementById("letterPopup").style.display="flex";
  document.getElementById("fullDate").innerText=
    document.getElementById("postcardDate").innerText;
}

/* CLOSE */
function closeLetter(){
  document.getElementById("letterPopup").style.display="none";
}

</script>

</body>
</html>
