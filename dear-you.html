<!DOCTYPE html>
<html>
<head>
<title>Dear You 💌</title>

<style>
html, body {
  margin: 0;
  padding: 0;
  font-family: 'Segoe UI', sans-serif;
  color: white;
  height: 100%;
}

/* 🌇 Full-page gradient (NO WHITE GAP) */
body {
  background: linear-gradient(to bottom, #ffb7a5, #ff8fab, #7a6c9d, #3a3d5c);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

/* 💖 Page wrapper */
.page {
  flex: 1;
  display: flex;
  flex-direction: column;
}

/* 💖 Top Banner */
.top-banner {
  width: 100%;
  background: linear-gradient(to right, rgba(122,108,157,0.85), rgba(255,143,171,0.75));
  padding: 35px 10px 25px;
  text-align: center;
  backdrop-filter: blur(12px);
}

.top-banner h1 {
  margin: 0;
  font-size: 2.5rem;
}

.top-banner p {
  margin-top: 8px;
  opacity: 0.9;
}

/* 💖 Cards */
.container {
  display: flex;
  justify-content: center;
  gap: 30px;
  padding: 60px 20px;
  flex-wrap: wrap;
}

.card {
  width: 260px;
  height: 140px;
  background: rgba(122,108,157,0.35);
  backdrop-filter: blur(15px);
  border-radius: 20px;
  padding: 20px;
  cursor: pointer;
  transition: 0.3s;
}

.card:hover {
  transform: translateY(-5px) scale(1.03);
}

.card h3 {
  margin: 0;
  color: #ff4d88;
}

.card p {
  margin-top: 10px;
  font-size: 0.9rem;
  opacity: 0.85;
}

/* 💖 Back */
.back {
  text-align: center;
  padding-bottom: 40px;
}

.back a {
  color: white;
  text-decoration: none;
  opacity: 0.8;
}
</style>

</head>

<body>

<div class="page">

  <!-- 💖 Banner -->
  <div class="top-banner">
    <h1>Dear You 💌</h1>
    <p>a place where my words live</p>
  </div>

  <!-- 💖 Sections -->
  <div class="container">

    <div class="card" onclick="location.href='echoes.html'">
      <h3>Echoes in Envelopes</h3>
      <p>letters written on the 22nd</p>
    </div>

    <div class="card" onclick="alert('Coming soon 💭')">
      <h3>The Venting Machine</h3>
      <p>a space for you to let it out</p>
    </div>

    <div class="card" onclick="alert('Locked 🔒')">
      <h3>Unsent Archive</h3>
      <p>things I never sent</p>
    </div>

  </div>

  <!-- 💖 Back -->
  <div class="back">
    <a href="index.html">← Back Home</a>
  </div>

</div>

</body>
</html>
