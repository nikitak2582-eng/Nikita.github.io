<!DOCTYPE html>
<html>
<head>
<title>Dear You 💌</title>
  
<meta name="viewport" content="width=device-width, initial-scale=1.0">  

<style>
/* 🌐 RESET */
html, body {
  margin: 0;
  padding: 0;
  height: 100%;
  font-family: 'Segoe UI', sans-serif;
  color: white;

  overflow-x: hidden; /* 🚫 stops left-right drag */
}

/* 🌇 BACKGROUND (FIXED + NO GLITCH) */
body {
  background: linear-gradient(to bottom, #ffb7a5, #ff8fab, #7a6c9d, #3a3d5c);
  min-height: 100vh;
  background-attachment: fixed;
}

/* prevents mobile overscroll color flash */
html {
  background: #ffb7a5;
  overscroll-behavior: none;
}

/* 💖 TOP BANNER */
.top-banner {
  width: 100%;
  background: linear-gradient(to right, rgba(122,108,157,0.85), rgba(255,143,171,0.75));
  padding: 35px 10px 25px;
  text-align: center;
  backdrop-filter: blur(12px);
}

.top-banner h1 {
  margin: 0;
  font-size: 2.4rem;
}

.top-banner p {
  margin-top: 8px;
  opacity: 0.9;
}

/* 💖 GRID */
.container {
  display: flex;
  justify-content: center;
  gap: 30px;
  padding: 60px 20px;
  flex-wrap: wrap;
}

/* 💖 CARDS */
.card {
  width: 260px;
  min-height: 140px;
  background: rgba(122,108,157,0.35);
  backdrop-filter: blur(15px);
  border-radius: 25px;
  padding: 22px;
  cursor: pointer;
  transition: 0.3s;
}

.card:hover {
  transform: translateY(-6px) scale(1.04);
}

/* ✨ TEXT (FIXED COLOR - no more pink blending issue) */
.card h3 {
  margin: 0;
  color: #f5f0ff;
}

.card p {
  margin-top: 10px;
  font-size: 0.95rem;
  opacity: 0.85;
}

/* 💖 BACK BUTTON */
.back {
  text-align: center;
  margin: 20px 0 40px;
}

.back a {
  color: #f5f0ff;
  text-decoration: none;
  opacity: 0.85;
}

/* ✨ FADE TRANSITION */
.fade {
  opacity: 0;
  transform: scale(1.01);
  transition: opacity 0.5s ease, transform 0.5s ease;
}

.fade.show {
  opacity: 1;
  transform: scale(1);
}
  
</style>
</head>

<body class="fade">

<!-- 💖 HEADER -->
<div class="top-banner">
  <h1>Dear You 💌</h1>
  <p>a place where my words live</p>
</div>

<!-- 💖 CARDS -->
<div class="container">

  <div class="card" onclick="location.href='echoes.html'">
    <h3>Echoes in Envelopes</h3>
    <p>letters written on the 22nd of every month</p>
  </div>

  <div class="card" onclick="alert('Coming soon 💭')">
    <h3>The Venting Machine</h3>
    <p>a space for you to let it out</p>
  </div>

  <div class="card" onclick="alert('Locked 🔒')">
    <h3>Unsent Archive</h3>
    <p>things I never sent</p>
  </div>

</div>

<!-- 💖 BACK -->
<div class="back">
  <a href="index.html">← Back Home</a>
</div>

<!-- ✨ FADE SCRIPT -->
<script>
document.addEventListener("DOMContentLoaded", () => {
  document.body.classList.add("show");
});

document.querySelectorAll("a").forEach(link => {
  link.addEventListener("click", function(e) {
    e.preventDefault();
    let href = this.href;
    document.body.classList.remove("show");
    setTimeout(() => {
      window.location = href;
    }, 400);
  });
});
</script>

</body>
</html>
