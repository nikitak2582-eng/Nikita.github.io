<!DOCTYPE html>
<html>
<head>
<title>Dear You 💌</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  color: white;
  overflow-x: hidden;
  min-height: 100vh;
}

/* SAME background as home */
.sky {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  z-index: -3;
  background: linear-gradient(to bottom, #ffb7a5, #ff8fab, #7a6c9d, #3a3d5c);
}

/* hills */
.hill {
  position: fixed;
  bottom: 0;
  width: 200%;
  height: 200px;
  background: #2e2f4f;
  border-radius: 50%;
  z-index: -1;
}

.hill.one { left: -50%; bottom: -80px; }
.hill.two { left: -30%; bottom: -120px; background: #23243f; }

/* 🌸 petals */
.petal {
  position: fixed;
  top: -10px;
  width: 12px;
  height: 12px;
  background: #ffd1dc;
  border-radius: 50% 0 50% 0;
  opacity: 1;
  box-shadow: 0 0 8px rgba(255,255,255,0.6);
  animation: fall 10s linear infinite;
}

@keyframes fall {
  0% { transform: translateY(0) rotate(0deg); opacity: 0; }
  10% { opacity: 1; }
  100% { transform: translateY(110vh) rotate(360deg); opacity: 0; }
}

/* 💖 top */
.top {
  text-align: center;
  padding: 40px 20px 10px;
}

.top h1 {
  margin: 0;
  font-size: 2.2rem;
}

.top p {
  opacity: 0.85;
}

/* 💖 grid */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
  gap: 30px;
  padding: 40px 20px;
  max-width: 1000px;
  margin: auto;
}

/* 💖 cards */
.card {
  background: rgba(122,108,157,0.35);
  backdrop-filter: blur(15px);
  border-radius: 25px;
  padding: 25px;
  cursor: pointer;
  transition: 0.3s;
}

.card:hover {
  transform: translateY(-5px) scale(1.04);
}

.card h2 {
  margin-top: 0;
  color: #ff4d88;
}

/* 💖 back */
.back {
  text-align: center;
  margin: 20px 0 40px;
}

a {
  text-decoration: none;
  color: white;
}
</style>
</head>

<body>

<div class="sky"></div>
<div class="hill one"></div>
<div class="hill two"></div>

<!-- petals -->
<div class="petal" style="left:10%; animation-delay:0s;"></div>
<div class="petal" style="left:30%; animation-delay:2s;"></div>
<div class="petal" style="left:50%; animation-delay:4s;"></div>
<div class="petal" style="left:70%; animation-delay:1s;"></div>
<div class="petal" style="left:90%; animation-delay:3s;"></div>

<!-- 💌 header -->
<div class="top">
  <h1>Dear You 💌</h1>
  <p>a place where my words live</p>
</div>

<!-- 💌 grid -->
<div class="grid">

  <a href="echoes.html">
    <div class="card">
      <h2>Echoes in Envelopes</h2>
      <p>letters written on the 22nd of every month</p>
    </div>
  </a>

  <div class="card">
    <h2>The Venting Machine</h2>
    <p>a space where you can type and let it stay</p>
  </div>

  <div class="card">
    <h2>Unsent Archive</h2>
    <p>words that were never meant to be sent</p>
  </div>

</div>

<!-- back -->
<div class="back">
  <a href="index.html">← Back Home</a>
</div>

</body>
</html>
