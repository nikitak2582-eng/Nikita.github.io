<!DOCTYPE html>
<html>
<head>
<title>Dear You 💌</title>
  
<meta name="viewport" content="width=device-width, initial-scale=1.0">  

<style>
/* 🌐 RESET */
html, body {
  margin: 0;
  padding: 0;
  height: 100%;
  font-family: 'Segoe UI', sans-serif;
  color: white;

  overflow-x: hidden;
  overscroll-behavior: none;   /* ✅ add this */
}
  
body {
  overflow-x: hidden;
}

/* 🌇 BACKGROUND (FIXED + NO GLITCH) */
body {
  background: linear-gradient(to bottom, #ffb7a5, #ff8fab, #7a6c9d, #3a3d5c);
  min-height: 100vh;
  background-attachment: fixed;
}

/* prevents mobile overscroll color flash */
html {
  background: #ffb7a5;
  overscroll-behavior: none;
}

/* 💖 TOP BANNER */
.top-banner {
  width: 100%;
  background: linear-gradient(to right, rgba(122,108,157,0.85), rgba(255,143,171,0.75));
  padding: 35px 10px 25px;
  text-align: center;
  backdrop-filter: blur(12px);
}

.top-banner h1 {
  margin: 0;
  font-size: 2.4rem;
}

.top-banner p {
  margin-top: 8px;
  opacity: 0.9;
}

/* 💖 GRID */
.container {
  display: flex;
  justify-content: center;
  gap: 30px;
  padding: 60px 20px;
  flex-wrap: wrap;
}

/* 💖 CARDS */
.card {
  width: 260px;
  min-height: 140px;
  background: rgba(122,108,157,0.35);
  backdrop-filter: blur(15px);
  border-radius: 25px;
  padding: 22px;
  cursor: pointer;
  transition: 0.3s;
}

.card:hover {
  transform: translateY(-6px) scale(1.04);
}

/* ✨ TEXT (FIXED COLOR - no more pink blending issue) */
.card h3 {
  margin: 0;
  color: #f5f0ff;
}

.card p {
  margin-top: 10px;
  font-size: 0.95rem;
  opacity: 0.85;
}

/* 🏠 HOME */
.home {
  text-align: center;
  margin: 20px 0 40px;
}

.home a {
  display: inline-block;
  padding: 10px 18px;
  border-radius: 20px;
  background: rgba(122,108,157,0.35);
  color: #f5f0ff;
  text-decoration: none;
  backdrop-filter: blur(10px);
  transition: 0.2s;
}

.home a:hover {
  transform: scale(1.05);
}

/* 🧼 GLOBAL SAFE BOX MODEL (prevents overflow bugs) */
*, *::before, *::after {
  box-sizing: border-box;
}

/* media safety */
img, video {
  max-width: 100%;
  display: block;
}
  
</style>
</head>

<body class="fade">

<!-- 💖 HEADER -->
<div class="top-banner">
  <h1>Dear You 💌</h1>
  <p>a place where my words live</p>
</div>

<!-- 💖 CARDS -->
<div class="container">

  <div class="card" onclick="location.href='echoes.html'">
    <h3>Echoes in Envelopes</h3>
    <p>letters written on the 22nd of every month</p>
  </div>

<div class="card" onclick="location.href='venting.html'">
  <h3>The Venting Machine</h3>
  <p>a space for you to let it out</p>
</div>

<div class="card" onclick="location.href='spoil.html'">
  <h3>Spoil Me Zone 💖</h3>
  <p>only soft things, only love</p>
</div>

</div>
  
<!-- 🏠 HOME -->
<div class="home">
  <a href="index.html">🏠 Home</a>
</div>
  
</body>
</html>
