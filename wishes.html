<!DOCTYPE html>
<html>
<head>
<title>Wish Review 💌</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600&family=Dancing+Script:wght@500&display=swap" rel="stylesheet">

<style>
html, body {
  margin: 0;
  padding: 0;
  min-height: 100%;
}

body {
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(to bottom, #ffe4ec, #ffd6e8, #fbcfe8);
}

/* HEADER */
.header{
  text-align:center;
  padding:40px 20px 10px;
}

.header h1{
  font-family:'Playfair Display',serif;
  color:#b85c8e;
}

.header p{
  font-family:'Dancing Script',cursive;
  color:#d17aa8;
}

/* CONTAINER */
.container{
  max-width:820px;
  margin:0 auto;
  padding:20px;
}

/* CARD */
.card{
  background:rgba(255,255,255,0.65);
  backdrop-filter: blur(10px);
  border-radius:20px;
  padding:16px;
  margin-bottom:15px;
  box-shadow:0 10px 25px rgba(0,0,0,0.1);
}

.wish-text{ color:#6a3b52; }
.meta{ color:#9b5b78; font-size:0.85rem; }
.badge{ background:#ffb6d2; padding:4px 10px; border-radius:999px; font-size:0.75rem; }

button{
  border:none;
  padding:8px 12px;
  border-radius:999px;
  background:#ff9ac2;
  color:white;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="header">
  <h1>Wish Review 💌</h1>
  <p>review the past 30 days of wishes — fulfilled or failed 💭</p>
</div>

<div class="container" id="list"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import { getDatabase, ref, onValue, update, remove } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyBeuP_d_C8Q8ou_egHFT2tDgpDrNLiYusk",
  authDomain: "dhruv-s-little-lobby.firebaseapp.com",
  databaseURL: "https://dhruv-s-little-lobby-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "dhruv-s-little-lobby",
  storageBucket: "dhruv-s-little-lobby.firebasestorage.app",
  messagingSenderId: "129807376775",
  appId: "1:129807376775:web:4e8d8d227772c0f115b322"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const wishesRef = ref(db, "wishes");

onValue(wishesRef, (snap)=>{
  const data = snap.val() || {};
  render(data);
});

function render(data){
  let box = document.getElementById("list");
  box.innerHTML = "";

  Object.entries(data).reverse().forEach(([id,w])=>{
    let div = document.createElement("div");
    div.className="card";

    div.innerHTML=`
      <div class="wish-text">💌 ${w.text}</div>
      <div class="meta">${w.status || "Pending"}</div>

      <button onclick="grant('${id}')">Granted 💖</button>
      <button onclick="deny('${id}')">Not Granted 💔</button>
      <button onclick="removeWish('${id}')">Erase</button>
    `;

    box.appendChild(div);
  });
}

window.grant = (id)=> update(ref(db,"wishes/"+id),{status:"Granted 💖"});
window.deny = (id)=> update(ref(db,"wishes/"+id),{status:"Not granted 💔"});
window.removeWish = (id)=> remove(ref(db,"wishes/"+id));
</script>

</body>
</html>
