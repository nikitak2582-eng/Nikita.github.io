<!DOCTYPE html>
<html>
<head>
<title>Wish Review 💌</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600&family=Dancing+Script:wght@500&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Segoe UI',sans-serif;
  background:linear-gradient(to bottom,#ffe4ec,#ffd6e8,#fbcfe8);
}

.header{
  text-align:center;
  padding:40px 20px 10px;
}

.header h1{
  font-family:'Playfair Display',serif;
  color:#b85c8e;
}

.header p{
  font-family:'Dancing Script',cursive;
  color:#d17aa8;
}

.container{
  max-width:820px;
  margin:0 auto;
  padding:20px;
}

.card{
  background:rgba(255,255,255,0.65);
  backdrop-filter: blur(10px);
  border-radius:20px;
  padding:16px;
  margin-bottom:15px;
  box-shadow:0 10px 25px rgba(0,0,0,0.1);
  position:relative;
}

.wish-text{
  font-size:1rem;
  color:#6a3b52;
  margin-bottom:8px;
}

.meta{
  font-size:0.85rem;
  color:#9b5b78;
}

.badge{
  display:inline-block;
  padding:4px 10px;
  border-radius:999px;
  background:#ffb6d2;
  font-size:0.75rem;
  margin-top:6px;
}

.options{
  margin-top:10px;
  display:flex;
  flex-wrap:wrap;
  gap:8px;
}

button{
  border:none;
  padding:8px 12px;
  border-radius:999px;
  cursor:pointer;
  background:#ff9ac2;
  color:white;
  font-size:0.85rem;
  transition:0.2s;
}

button:hover{
  transform:scale(1.05);
}

.penalty{
  margin-top:8px;
  font-size:0.85rem;
  color:#7a3f5b;
}

.check{
  margin-top:10px;
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  font-size:0.85rem;
  color:#7a3f5b;
}

.streak{
  text-align:center;
  margin:10px;
  font-family:'Dancing Script',cursive;
  color:#b85c8e;
  font-size:1.2rem;
}

a{
  color:#b85c8e;
  text-decoration:none;
}
</style>
</head>

<body>

<div class="header">
  <h1>Wish Review 💌</h1>
  <p>30-day devotion cycle with soft accountability</p>
</div>

<div class="streak" id="streakBox"></div>

<div class="container" id="list"></div>

<div style="text-align:center;margin:20px;">
  <a href="index.html">🏠 back home</a>
</div>

<script>
let wishes = JSON.parse(localStorage.getItem("wishes")) || [];
let streak = parseInt(localStorage.getItem("streak")) || 0;

function save(){
  localStorage.setItem("wishes", JSON.stringify(wishes));
  localStorage.setItem("streak", streak);
  render();
}

function daysOld(t){
  return Math.floor((Date.now() - (t||Date.now()))/(1000*60*60*24));
}

function render(){
  let box = document.getElementById("list");
  box.innerHTML = "";

  document.getElementById("streakBox").innerHTML = 
    "💖 streak: " + streak + " wishes emotionally maintained";

  wishes.forEach((w,i)=>{
    if(!w.time) w.time = Date.now();

    let d = daysOld(w.time);
    let locked = d < 30;

    let div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <div class="wish-text">💌 ${w.text}</div>
      <div class="meta">day ${d}/30 | status: ${w.status || "Pending"}</div>
      <div class="badge">30-day review system</div>

      <div class="check">
        <label><input type="checkbox" ${w.granted ? "checked" : ""} onchange="grant(${i})"> granted 💖</label>
        <label><input type="checkbox" ${w.denied ? "checked" : ""} onchange="deny(${i})"> not granted 💔</label>
      </div>

      <div class="options">
        <button onclick="penalize(${i})">add penalty 🎀</button>
      </div>

      ${w.penalty ? `<div class='penalty'>💸 ${w.penalty}</div>` : ""}
    `;

    box.appendChild(div);
  });
}

function grant(i){
  wishes[i].granted = !wishes[i].granted;
  wishes[i].status = wishes[i].granted ? "Granted 💖" : "Pending";
  if(wishes[i].granted) streak++;
  save();
}

function deny(i){
  wishes[i].denied = !wishes[i].denied;
  wishes[i].status = wishes[i].denied ? "Not granted 💔" : "Pending";
  if(wishes[i].denied) streak = 0;
  save();
}

function penalize(i){
  let p = prompt("cute penalty?");
  if(!p) return;
  wishes[i].penalty = p;
  save();
}

render();
</script>

</body>
</html>
