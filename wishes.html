<!DOCTYPE html>
<html>
<head>
<title>Wish Review 💌</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600&family=Dancing+Script:wght@500&display=swap" rel="stylesheet">

<style>

/* ✅ RESET */
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

html{
  height:100%;
}

/* ✅ SINGLE SMOOTH BACKGROUND (FIXED) */
body{
  min-height:100vh;
  font-family:'Segoe UI',sans-serif;
  background: linear-gradient(to bottom, #ffe4ec, #ffd6e8, #fbcfe8);
  background-attachment: fixed;
}

/* HEADER */
.header{
  text-align:center;
  padding:40px 20px 10px;
}

.header h1{
  font-family:'Playfair Display',serif;
  color:#b85c8e;
}

.header p{
  font-family:'Dancing Script',cursive;
  color:#d17aa8;
}

/* CONTAINER */
.container{
  max-width:820px;
  margin:0 auto;
  padding:20px;
}

/* CARD */
.card{
  background:rgba(255,255,255,0.65);
  backdrop-filter: blur(10px);
  border-radius:20px;
  padding:16px;
  margin-bottom:15px;
  box-shadow:0 10px 25px rgba(0,0,0,0.1);
}

/* TEXT */
.wish-text{
  color:#6a3b52;
  margin-bottom:6px;
}

.meta{
  font-size:0.85rem;
  color:#9b5b78;
}

.badge{
  display:inline-block;
  padding:4px 10px;
  border-radius:999px;
  background:#ffb6d2;
  font-size:0.75rem;
  margin-top:6px;
}

/* CHECKBOX */
.check{
  margin-top:10px;
  display:flex;
  gap:15px;
  font-size:0.9rem;
  color:#7a3f5b;
}

/* BUTTONS */
button{
  margin-top:10px;
  border:none;
  padding:7px 12px;
  border-radius:999px;
  background:#ff9ac2;
  color:white;
  cursor:pointer;
}

/* PENALTY */
.penalty{
  margin-top:6px;
  font-size:0.85rem;
  color:#7a3f5b;
}

a{
  text-decoration:none;
  color:#b85c8e;
}

</style>
</head>

<body>

<div class="header">
  <h1>Wish Review 💌</h1>
  <p>review the past 30 days of wishes — fulfilled or failed 💭</p>
</div>

<div class="container" id="list"></div>

<div style="text-align:center;margin:20px;">
  <a href="index.html">🏠 back home</a>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import { getDatabase, ref, onValue, update, remove } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyBeuP_d_C8Q8ou_egHFT2tDgpDrNLiYusk",
  authDomain: "dhruv-s-little-lobby.firebaseapp.com",
  databaseURL: "https://dhruv-s-little-lobby-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "dhruv-s-little-lobby",
  storageBucket: "dhruv-s-little-lobby.firebasestorage.app",
  messagingSenderId: "129807376775",
  appId: "1:129807376775:web:4e8d8d227772c0f115b322"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const wishesRef = ref(db, "wishes");

/* 🔄 LIVE LOAD */
onValue(wishesRef, (snap)=>{
  const data = snap.val() || {};
  render(data);
});

/* 🎀 RENDER */
function render(data){
  let box = document.getElementById("list");
  box.innerHTML = "";

  Object.entries(data).reverse().forEach(([id,w])=>{

    let div = document.createElement("div");
    div.className="card";

    div.innerHTML=`
      <div class="wish-text">💌 ${w.text}</div>

      <div class="meta">
        status: ${w.status || "Pending"}
      </div>

      <div class="badge">30-day soft review</div>

      <div class="check">
        <label>
          <input type="checkbox" ${w.granted ? "checked":""}
          onchange="grant('${id}')"> granted 💖
        </label>

        <label>
          <input type="checkbox" ${w.denied ? "checked":""}
          onchange="deny('${id}')"> not granted 💔
        </label>
      </div>

      <button onclick="penalty('${id}')">add penalty 🎀</button>
      <button onclick="removeWish('${id}')">erase 🗑️</button>

      ${w.penalty ? `<div class="penalty">💸 ${w.penalty}</div>` : ""}
    `;

    box.appendChild(div);
  });
}

/* 💖 ACTIONS */
window.grant = (id)=>{
  update(ref(db,"wishes/"+id),{
    granted:true,
    denied:false,
    status:"Granted 💖"
  });
}

window.deny = (id)=>{
  update(ref(db,"wishes/"+id),{
    denied:true,
    granted:false,
    status:"Not granted 💔"
  });
}

window.penalty = (id)=>{
  let p = prompt("cute penalty?");
  if(!p) return;

  update(ref(db,"wishes/"+id),{
    penalty:p
  });
}

window.removeWish = (id)=>{
  if(!confirm("erase this wish?")) return;
  remove(ref(db,"wishes/"+id));
}
</script>

</body>
</html>
