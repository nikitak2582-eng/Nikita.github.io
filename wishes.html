<!DOCTYPE html>
<html>
<head>
<title>Wish Review 💌</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600&family=Dancing+Script:wght@500&display=swap" rel="stylesheet">

<style>
html, body {
  height: 100%;
  margin: 0;
  padding: 0;
}

/* FIXED SMOOTH BACKGROUND */
body {
  min-height: 100vh;
  background: linear-gradient(to bottom, #ffe4ec, #ffd6e8, #fbcfe8);
  background-attachment: fixed;
  overscroll-behavior: none;
  font-family: 'Segoe UI', sans-serif;
}

/* HEADER */
.header{
  text-align:center;
  padding:40px 20px 10px;
}

.header h1{
  font-family:'Playfair Display',serif;
  color:#b85c8e;
}

.header p{
  font-family:'Dancing Script',cursive;
  color:#d17aa8;
}

/* CONTAINER */
.container{
  max-width:820px;
  margin:0 auto;
  padding:20px;
}

/* CARD */
.card{
  background:rgba(255,255,255,0.65);
  backdrop-filter: blur(10px);
  border-radius:20px;
  padding:16px;
  margin-bottom:15px;
  box-shadow:0 10px 25px rgba(0,0,0,0.1);
  position:relative;
}

/* TEXT */
.wish-text{
  font-size:1rem;
  color:#6a3b52;
  margin-bottom:8px;
}

.meta{
  font-size:0.85rem;
  color:#9b5b78;
}

.badge{
  display:inline-block;
  padding:4px 10px;
  border-radius:999px;
  background:#ffb6d2;
  font-size:0.75rem;
  margin-top:6px;
}

/* OPTIONS */
.check{
  margin-top:10px;
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  font-size:0.85rem;
  color:#7a3f5b;
}

.options{
  margin-top:10px;
  display:flex;
  flex-wrap:wrap;
  gap:8px;
}

/* BUTTONS */
button{
  border:none;
  padding:8px 12px;
  border-radius:999px;
  cursor:pointer;
  background:#ff9ac2;
  color:white;
  font-size:0.85rem;
  transition:0.2s;
}

button:hover{
  transform:scale(1.05);
}

/* PENALTY */
.penalty{
  margin-top:8px;
  font-size:0.85rem;
  color:#7a3f5b;
}

/* STREAK */
.streak{
  text-align:center;
  margin:10px;
  font-family:'Dancing Script',cursive;
  color:#b85c8e;
  font-size:1.2rem;
}

/* LINK */
a{
  color:#b85c8e;
  text-decoration:none;
}
</style>
</head>

<body>

<div class="header">
  <h1>Wish Review 💌</h1>
  <p>30-day devotion cycle with soft accountability</p>
  <p style="font-size:0.9rem; color:#b85c8e; margin-top:5px;">
    here’s your space to softly judge my last 30 days… was i good or do i need to try harder? 💗
  </p>
</div>

<div class="streak" id="streakBox"></div>

<div class="container" id="list"></div>

<div style="text-align:center;margin:20px;">
  <a href="index.html">🏠 back home</a>
</div>

<script>
let wishes = JSON.parse(localStorage.getItem("wishes")) || [];
let streak = parseInt(localStorage.getItem("streak")) || 0;

function save(){
  localStorage.setItem("wishes", JSON.stringify(wishes));
  localStorage.setItem("streak", streak);
  render();
}

function daysOld(t){
  return Math.floor((Date.now() - (t||Date.now()))/(1000*60*60*24));
}

function render(){
  let box = document.getElementById("list");
  box.innerHTML = "";

  document.getElementById("streakBox").innerHTML =
    "💖 streak: " + streak + " wishes emotionally maintained";

  wishes.forEach((w,i)=>{
    if(!w.time) w.time = Date.now();

    let d = daysOld(w.time);

    let div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <div class="wish-text">💌 ${w.text}</div>
      <div class="meta">day ${d}/30 | status: ${w.status || "Pending"}</div>
      <div class="badge">30-day review system</div>

      <div class="check">
        <label>
          <input type="checkbox" ${w.granted ? "checked" : ""} onchange="grant(${i})">
          granted 💖
        </label>

        <label>
          <input type="checkbox" ${w.denied ? "checked" : ""} onchange="deny(${i})">
          not granted 💔
        </label>
      </div>

      <div class="options">
        <button onclick="penalize(${i})">add penalty 🎀</button>
        <button onclick="removeWish(${i})">erase 🗑️</button>
      </div>

      ${w.penalty ? `<div class='penalty'>💸 ${w.penalty}</div>` : ""}
    `;

    box.appendChild(div);
  });
}

/* ONLY ONE OPTION ACTIVE */
function grant(i){
  wishes[i].granted = true;
  wishes[i].denied = false;
  wishes[i].status = "Granted 💖";
  streak++;
  save();
}

function deny(i){
  wishes[i].denied = true;
  wishes[i].granted = false;
  wishes[i].status = "Not granted 💔";
  streak = 0;
  save();
}

/* penalty */
function penalize(i){
  let p = prompt("cute penalty?");
  if(!p) return;
  wishes[i].penalty = p;
  save();
}

/* delete */
function removeWish(i){
  if(!confirm("erase this wish?")) return;
  wishes.splice(i,1);
  save();
}

render();
</script>

</body>
</html>
