<!DOCTYPE html>
<html>
<head>
<title>For You ❤️</title>
<style>
body {
  background-color: #ffe6f0;
  font-family: Arial;
  text-align: center;
  padding: 50px;
}
h1 {
  color: #ff4d88;
}
.box {
  background: white;
  padding: 20px;
  border-radius: 20px;
  margin: 20px;
}
button {
  padding: 10px 20px;
  border: none;
  background: #ff4d88;
  color: white;
  border-radius: 10px;
}
</style>
</head>

<body>

<h1>Hi My Love 💖</h1>

<div class="box">
<p>From the moment we met, everything felt different...</p>
</div>

<div class="box">
<button onclick="showMessage()">Click when you miss me</button>
<p id="hidden"></p>
</div>

<script>
function showMessage() {
  document.getElementById("hidden").innerText =
  "I’m always here for you. Always. ❤️";
}
</script>

</body>
</html>
