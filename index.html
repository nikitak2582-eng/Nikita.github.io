<!DOCTYPE html>
<html>
<head>
<title>For You 🌸</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  text-align: center;
  background: linear-gradient(to bottom, #bcdcff, #e6f2ff);
}

/* Sakura */
.sakura-bg {
  position: fixed;
  bottom: 0;
  width: 100%;
  height: 50%;
  background: url("https://png.pngtree.com/png-clipart/20230418/original/pngtree-sakura-tree-png-image_9069273.png") no-repeat bottom center;
  background-size: contain;
  z-index: -1;
}

/* Card */
.card {
  background: rgba(255,255,255,0.7);
  padding: 20px;
  border-radius: 15px;
  margin: 20px;
}

/* Buttons */
button {
  padding: 10px 15px;
  border: none;
  background: #ff7aa2;
  color: white;
  border-radius: 8px;
}

.hidden {
  display: none;
}
</style>
</head>

<body>

<div class="sakura-bg"></div>

<h1>Hey You 🌸</h1>

<div class="card">
  <button onclick="show('msg')">Click me</button>
  <p id="msg" class="hidden">I made this just for you.</p>
</div>

<script>
function show(id) {
  document.getElementById(id).style.display = "block";
}
</script>

</body>
</html>
