<!DOCTYPE html>
<html>
<head>
<title>For You 🌸</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  color: white;
  text-align: center;
  overflow-x: hidden;

  /* 🌸 Sakura sky */
  background: linear-gradient(to bottom, #bcdcff, #e6f2ff);
}

/* 🌸 Pixel overlay */
body::after {
  content: "";
  position: fixed;
  width: 100%;
  height: 100%;
  background-image: url("https://www.transparenttextures.com/patterns/pixel-weave.png");
  opacity: 0.15;
  z-index: -1;
}

/* 🌸 Sakura image layer */
.sakura-bg {
  position: fixed;
  bottom: 0;
  width: 100%;
  height: 60%;
  background: url("https://raw.githubusercontent.com/mdn/learning-area/main/css/styling-boxes/backgrounds/sakura.png") no-repeat bottom center;
  background-size: contain;
  z-index: -1;
}

/* 🌸 Petals */
.petal {
  position: fixed;
  top: -10px;
  width: 10px;
  height: 10px;
  background: pink;
  border-radius: 50%;
  opacity: 0.7;
  animation: fall linear infinite;
}

@keyframes fall {
  to {
    transform: translateY(100vh) translateX(50px);
    opacity: 0;
  }
}

/* Content */
h1 {
  margin-top: 40px;
  color: #ff7aa2;
}

.card {
  background: rgba(255,255,255,0.6);
  color: #333;
  padding: 20px;
  border-radius: 15px;
  margin: 20px auto;
  max-width: 400px;
  backdrop-filter: blur(8px);
}

button {
  padding: 10px 18px;
  border: none;
  background: #ff7aa2;
  color: white;
  border-radius: 8px;
  margin: 10px;
}

.hidden {
  display: none;
  margin-top: 10px;
}
</style>
</head>

<body>

<div class="sakura-bg"></div>

<h1>Hey You 🌸</h1>

<div class="card">
  <p>This feels like a quiet moment… just us.</p>
</div>

<div class="card">
  <button onclick="show('miss')">When you miss me</button>
  <p id="miss" class="hidden">I’m always right here, just not always visible.</p>

  <button onclick="show('sad')">When you're not okay</button>
  <p id="sad" class="hidden">You don’t have to carry everything alone.</p>

  <button onclick="show('sleep')">When you can’t sleep</button>
  <p id="sleep" class="hidden">Close your eyes… I’m there.</p>
</div>

<script>
function show(id) {
  document.getElementById(id).style.display = "block";
}

/* 🌸 Falling petals */
function createPetal() {
  const petal = document.createElement("div");
  petal.classList.add("petal");
  petal.style.left = Math.random() * 100 + "vw";
  petal.style.animationDuration = (3 + Math.random() * 5) + "s";

  document.body.appendChild(petal);

  setTimeout(() => {
    petal.remove();
  }, 8000);
}

setInterval(createPetal, 300);
</script>

</body>
</html>
