<!DOCTYPE html>
<html>
<head>
<title>For You 🌸</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  text-align: center;
  overflow-x: hidden;
  color: white;
}

/* 🌌 SKY */
.sky {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  z-index: -3;

  background: linear-gradient(
    to bottom,
    #a8d8ff,
    #cdb4db,
    #ffc8dd,
    #ffe5ec
  );
}

/* ☁️ CLOUDS */
.cloud {
  position: absolute;
  background: white;
  border-radius: 50%;
  opacity: 0.6;
  filter: blur(10px);
  animation: float 80s linear infinite;
}

@keyframes float {
  from { transform: translateX(-200px); }
  to { transform: translateX(120vw); }
}

/* CONTENT */
h1 {
  margin-top: 60px;
  color: #fff;
  text-shadow: 0 0 10px rgba(255,255,255,0.8);
}

.card {
  background: rgba(0,0,0,0.3);
  backdrop-filter: blur(8px);
  padding: 20px;
  border-radius: 15px;
  margin: 20px auto;
  max-width: 400px;
}

button {
  padding: 10px 15px;
  border: none;
  background: #ff9eb5;
  color: black;
  border-radius: 8px;
  margin: 10px;
  cursor: pointer;
}

.hidden {
  display: none;
  margin-top: 10px;
}
</style>
</head>

<body>

<!-- 🌌 SKY -->
<div class="sky"></div>

<!-- ☁️ CLOUDS -->
<div class="cloud" style="width:140px;height:70px;top:20%;left:5%;"></div>
<div class="cloud" style="width:200px;height:90px;top:30%;left:40%;"></div>
<div class="cloud" style="width:120px;height:60px;top:15%;left:70%;"></div>

<!-- 💖 CONTENT -->
<h1>Hey You 🌸</h1>

<div class="card">
  <p>This feels like a quiet moment… just us.</p>
</div>

<div class="card">
  <button onclick="show('miss')">When you miss me</button>
  <p id="miss" class="hidden">I’m always right here.</p>

  <button onclick="show('sad')">When you're not okay</button>
  <p id="sad" class="hidden">You don’t have to carry everything alone.</p>

  <button onclick="show('sleep')">When you can’t sleep</button>
  <p id="sleep" class="hidden">Close your eyes… I’m there.</p>
</div>

<script>
function show(id) {
  document.getElementById(id).style.display = "block";
}
</script>

</body>
</html>
