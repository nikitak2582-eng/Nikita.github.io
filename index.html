<!DOCTYPE html>
<html>
<head>
<title>For You ❤️</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  color: white;
  overflow-x: hidden;
  min-height: 100vh;
}

/* 🌇 Background (UNCHANGED) */
.sky {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  z-index: -3;
  background: linear-gradient(to bottom, #ffb7a5, #ff8fab, #7a6c9d, #3a3d5c);
}

/* 🌄 Hills */
.hill {
  position: fixed;
  bottom: 0;
  width: 200%;
  height: 200px;
  background: #2e2f4f;
  border-radius: 50%;
  z-index: -1;
}

.hill.one { left: -50%; bottom: -80px; }
.hill.two { left: -30%; bottom: -120px; background: #23243f; }

/* 🌸 Petals */
.petal {
  position: fixed;
  top: -10px;
  width: 12px;
  height: 12px;
  background: #ffd1dc;
  border-radius: 50% 0 50% 0;
  opacity: 1;
  box-shadow: 0 0 8px rgba(255,255,255,0.6);
  animation: fall 10s linear infinite;
}

@keyframes fall {
  0% { transform: translateY(0) rotate(0deg); opacity: 0; }
  10% { opacity: 1; }
  100% { transform: translateY(110vh) rotate(360deg); opacity: 0; }
}

/* 💖 Top Banner */
.top-banner {
  width: 100%;
  background: linear-gradient(to right, rgba(122,108,157,0.85), rgba(255,143,171,0.75));
  padding: 35px 10px 25px;
  text-align: center;
  backdrop-filter: blur(12px);
}

.top-banner h1 {
  margin: 0;
  font-size: 2.5rem;
}

.top-banner p {
  margin-top: 8px;
  opacity: 0.9;
}

/* 💖 Sections */
.sections {
  width: 100%;
  display: flex;
  justify-content: center;
  gap: 40px;
  padding: 20px 10px 30px;
  flex-wrap: wrap;
}

.section-btn {
  background: rgba(122,108,157,0.35);
  backdrop-filter: blur(10px);
  padding: 12px 20px;
  border-radius: 20px;
  cursor: pointer;
  transition: 0.3s;
}

.section-btn:hover {
  transform: translateY(-3px) scale(1.05);
}

a {
  text-decoration: none;
  color: white;
}
</style>
</head>

<body>

<div class="sky"></div>
<div class="hill one"></div>
<div class="hill two"></div>

<!-- petals -->
<div class="petal" style="left:10%; animation-delay:0s;"></div>
<div class="petal" style="left:30%; animation-delay:2s;"></div>
<div class="petal" style="left:50%; animation-delay:4s;"></div>
<div class="petal" style="left:70%; animation-delay:1s;"></div>
<div class="petal" style="left:90%; animation-delay:3s;"></div>

<!-- 💖 Banner -->
<div class="top-banner">
  <h1>Dhruv's Little Lobby &lt;3</h1>
  <p>by the best girlfriend ever</p>
</div>

<div class="sections">
  <div class="section-btn">Home</div>

  <a href="dear-you.html">
    <div class="section-btn">Dear You</div>
  </a>

  <a href="if-found.html">
    <div class="section-btn">If Found</div>
  </a>

  <a href="memory-vault.html">
    <div class="section-btn">Memory Vault</div>
  </a>
</div>

</body>
</html>
