<!DOCTYPE html>
<html>
<head>
<title>For You ⚡</title>

<style>
body {
  margin: 0;
  background: black;
  color: #e0e0e0;
  font-family: 'Segoe UI', sans-serif;
  text-align: center;
  overflow-x: hidden;
}

/* 🌌 Stars background */
canvas {
  position: fixed;
  top: 0;
  left: 0;
  z-index: -1;
}

/* Glow heading */
h1 {
  margin-top: 40px;
  color: #00f7ff;
  text-shadow: 0 0 15px #00f7ff;
}

/* Cards */
.card {
  background: rgba(20,20,20,0.8);
  padding: 20px;
  border-radius: 15px;
  margin: 20px auto;
  max-width: 400px;
  box-shadow: 0 0 20px rgba(0,247,255,0.1);
}

/* Buttons */
button {
  padding: 12px 18px;
  border: 1px solid #00f7ff;
  background: transparent;
  color: #00f7ff;
  border-radius: 8px;
  margin: 10px;
  transition: 0.3s;
}

button:hover {
  background: #00f7ff;
  color: black;
  box-shadow: 0 0 10px #00f7ff;
}

.hidden {
  display: none;
  margin-top: 10px;
  color: #ccc;
}

/* Secret link */
.secret {
  margin-top: 40px;
  font-size: 12px;
  opacity: 0.3;
}
</style>
</head>

<body>

<canvas id="stars"></canvas>

<h1>Hey You ⚡</h1>

<div class="card">
  <p>I know you built something from scratch…  
  so I made something you’d feel.</p>
</div>

<div class="card">
  <button onclick="show('miss')">When you miss me</button>
  <p id="miss" class="hidden">I’m always closer than you think.</p>

  <button onclick="show('sad')">When you're not okay</button>
  <p id="sad" class="hidden">You don’t have to say anything. I understand.</p>

  <button onclick="show('sleep')">When you can’t sleep</button>
  <p id="sleep" class="hidden">Close your eyes… I’m right there.</p>

  <button onclick="playSong()">Tap this</button>
</div>

<div class="card">
  <p>We’ve been us for:</p>
  <h2 id="timer"></h2>
</div>

<!-- 🔒 Secret Page -->
<div class="secret">
  <a href="secret.html" style="color:#00f7ff;">.</a>
</div>

<!-- 🎵 Hidden Song -->
<audio id="song" src="YOUR_SONG_LINK.mp3"></audio>

<script>
function show(id) {
  document.getElementById(id).style.display = "block";
}

/* 🎵 play music */
function playSong() {
  document.getElementById("song").play();
}

/* ⏳ Timer */
const startDate = new Date("2024-01-01"); // CHANGE THIS

function updateTimer() {
  const now = new Date();
  const diff = now - startDate;

  const days = Math.floor(diff / (1000 * 60 * 60 * 24));
  document.getElementById("timer").innerText = days + " days ❤️";
}

setInterval(updateTimer, 1000);

/* 🌌 Stars animation */
const canvas = document.getElementById("stars");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let stars = [];

for (let i = 0; i < 100; i++) {
  stars.push({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height,
    radius: Math.random() * 1.5
  });
}

function drawStars() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.fillStyle = "white";

  stars.forEach(star => {
    ctx.beginPath();
    ctx.arc(star.x, star.y, star.radius, 0, Math.PI * 2);
    ctx.fill();
  });

  requestAnimationFrame(drawStars);
}

drawStars();
</script>

</body>
</html>
