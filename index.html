<!DOCTYPE html>
<html>
<head>
<title>For You ⚡</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  color: white;
  text-align: center;
  overflow-x: hidden;

  /* 🌌 Your Name sky gradient */
  background: linear-gradient(
    to bottom,
    #0b1d51,
    #1b3c73,
    #3a6ea5,
    #6a89cc
  );
}

/* Canvas for stars */
canvas {
  position: fixed;
  top: 0;
  left: 0;
  z-index: -1;
}
</style>
</head>

<body>

<canvas id="stars"></canvas>

<h1>Hey You ⚡</h1>

<div class="card">
  <p>I know you built something from scratch…  
  so I made something you’d feel.</p>
</div>

<div class="card">
  <button onclick="show('miss')">When you miss me</button>
  <p id="miss" class="hidden">I’m always closer than you think.</p>

  <button onclick="show('sad')">When you're not okay</button>
  <p id="sad" class="hidden">You don’t have to say anything. I understand.</p>

  <button onclick="show('sleep')">When you can’t sleep</button>
  <p id="sleep" class="hidden">Close your eyes… I’m right there.</p>

  <button onclick="playSong()">Tap this</button>
</div>

<div class="card">
  <p>We’ve been us for:</p>
  <h2 id="timer"></h2>
</div>

<!-- 🔒 Secret Page -->
<div class="secret">
  <a href="secret.html" style="color:#00f7ff;">.</a>
</div>

<!-- 🎵 Hidden Song -->
<audio id="song" src="YOUR_SONG_LINK.mp3"></audio>
  
<script>
const canvas = document.getElementById("stars");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let stars = [];

for (let i = 0; i < 150; i++) {
  stars.push({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height,
    radius: Math.random() * 1.5,
    alpha: Math.random()
  });
}

function drawStars() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  stars.forEach(star => {
    star.alpha += (Math.random() - 0.5) * 0.05;

    ctx.beginPath();
    ctx.arc(star.x, star.y, star.radius, 0, Math.PI * 2);
    ctx.fillStyle = "rgba(255,255,255," + star.alpha + ")";
    ctx.fill();
  });

  requestAnimationFrame(drawStars);
}

drawStars();
</script>

</body>
</html>
