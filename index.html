<!DOCTYPE html>
<html>
<head>
<title>For You ❤️</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  text-align: center;
  color: white;
  overflow: hidden;
}

/* 🌌 Background Image + Cinematic Effect */
.sky {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  z-index: -3;
  overflow: hidden;
}

/* actual image layer */
.sky::before {
  content: "";
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;

  background: url("bg.jpg") no-repeat center center/cover;

  transform: scale(1.08);
  filter: blur(2px) brightness(0.9);

  animation: zoomSlow 20s ease-in-out infinite alternate;
}

@keyframes zoomSlow {
  0% {
    transform: scale(1.05);
  }
  100% {
    transform: scale(1.12);
  }
}

/* 🎨 Color overlay for blending */
.overlay {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  z-index: -2;

  background: linear-gradient(
    to bottom,
    rgba(11, 26, 58, 0.6),
    rgba(31, 60, 115, 0.4),
    rgba(255, 158, 181, 0.3),
    rgba(255, 214, 165, 0.4)
  );
}

/* ✨ Glow effect */
.glow {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  z-index: -1;

  background: radial-gradient(circle at 50% 70%, rgba(255,255,255,0.15), transparent 60%);
}

/* 🌟 Stars (more dense + varied) */
.star {
  position: absolute;
  border-radius: 50%;
  background: white;
  opacity: 0.8;
  animation: twinkle 3s infinite ease-in-out;
}

/* different sizes */
.star.small { width: 1px; height: 1px; opacity: 0.6; }
.star.medium { width: 2px; height: 2px; }
.star.big { width: 3px; height: 3px; opacity: 1; box-shadow: 0 0 6px white; }

@keyframes twinkle {
  0%, 100% { opacity: 0.2; }
  50% { opacity: 1; }
}

@keyframes twinkle {
  0%, 100% { opacity: 0.2; }
  50% { opacity: 1; }
}

/* 💖 Floating hearts */
.heart {
  position: fixed;
  bottom: -10px;
  width: 12px;
  height: 12px;
  background: #ff6b81;
  transform: rotate(45deg);
  animation: floatUp 8s linear infinite;
}

.heart::before,
.heart::after {
  content: "";
  position: absolute;
  width: 12px;
  height: 12px;
  background: #ff6b81;
  border-radius: 50%;
}

.heart::before { top: -6px; left: 0; }
.heart::after { left: -6px; top: 0; }

@keyframes floatUp {
  0% { transform: translateY(0) rotate(45deg); opacity: 0; }
  10% { opacity: 1; }
  100% { transform: translateY(-110vh) rotate(45deg); opacity: 0; }
}

/* 💖 Heading Box */
.heading-box {
  margin-top: 80px;
  display: inline-block;
  padding: 15px 30px;
  border-radius: 20px;
  background: rgba(0,0,0,0.4);
  backdrop-filter: blur(15px);
  box-shadow: 0 0 25px rgba(255,255,255,0.15);
}

.heading-box h1 {
  margin: 0;
  font-size: 2.5rem;
  text-shadow: 0 0 10px rgba(255,255,255,0.8);
}

/* 💖 Content */
h1 {
  margin-top: 100px;
  font-size: 2.5rem;
  text-shadow: 0 0 15px rgba(255,255,255,0.8);
}

.card {
  background: rgba(0,0,0,0.4);
  backdrop-filter: blur(12px);
  padding: 20px;
  border-radius: 15px;
  margin: 20px auto;
  max-width: 400px;
}

button {
  padding: 10px 15px;
  border: none;
  background: #ff9eb5;
  color: black;
  border-radius: 8px;
  margin: 10px;
  cursor: pointer;
}

.hidden {
  display: none;
  margin-top: 10px;
}

.top-bar span {
  font-size: 1.4rem;
  font-weight: 600;
  letter-spacing: 1px;
  color: #f3e8ff; /* soft lavender white */
}

.top-bar span {
  font-size: 1.4rem;
  font-weight: 600;
  letter-spacing: 1px;
  color: #ffffff;
}

.slider-text {
  display: inline-block;
  padding-left: 100%;
  font-size: 1.8rem;
  font-weight: 600;
  color: #ffffff;
  text-shadow: 0 0 10px rgba(255,255,255,0.8);
  animation: slideText 12s linear infinite;
}

@keyframes slideText {
  0% { transform: translateX(0); }
  100% { transform: translateX(-100%); }
}
</style>
</head>

<body>

<!-- 💖 Top Title -->

</div>

<div class="sky"></div>
<div class="overlay"></div>
<div class="glow"></div>

<!-- Stars -->
<div class="star small" style="top:5%; left:10%;"></div>
<div class="star medium" style="top:15%; left:25%;"></div>
<div class="star big" style="top:20%; left:70%;"></div>
<div class="star small" style="top:30%; left:50%;"></div>
<div class="star medium" style="top:40%; left:80%;"></div>
<div class="star small" style="top:60%; left:20%;"></div>
<div class="star big" style="top:70%; left:60%;"></div>
<div class="star medium" style="top:80%; left:35%;"></div>
<div class="star small" style="top:50%; left:75%;"></div>
<div class="star medium" style="top:10%; left:85%;"></div>
<div class="heart" style="left:10%; animation-delay:0s;"></div>
<div class="heart" style="left:30%; animation-delay:2s;"></div>
<div class="heart" style="left:50%; animation-delay:4s;"></div>
<div class="heart" style="left:70%; animation-delay:1s;"></div>
<div class="heart" style="left:90%; animation-delay:3s;"></div>

<!-- 💖 Heading with glass effect -->
<h1 style="margin-top:120px; font-size:2.8rem; font-weight:600; letter-spacing:1px; text-shadow:0 0 20px rgba(255,255,255,0.9);">
  Hey you.
</h1>

<div class="card">
  <p>I made this for you… don’t rush it.</p>
</div>

<div class="card">
  <button onclick="show('one')">Click me</button>
  <p id="one" class="hidden">You’re more special than you realize.</p>

  <button onclick="show('two')">And this</button>
  <p id="two" class="hidden">I really love having you in my life.</p>

  <button onclick="show('three')">Last one</button>
  <p id="three" class="hidden">Happy Birthday ❤️</p>
</div>

<script>
function show(id) {
  document.getElementById(id).style.display = "block";
}
</script>

</body>
</html>
