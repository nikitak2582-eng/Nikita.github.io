<!DOCTYPE html>
<html>
<head>
<title>For You ❤️</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  text-align: center;
  color: white;
  overflow: hidden;
}

/* 🌌 Gradient Sky */
.sky {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  z-index: -3;

  background: linear-gradient(
    to bottom,
    #4f5d75 0%,
    #7d8ca3 30%,
    #c9a7b5 65%,
    #f3d1b0 100%
  );
}

/* ✨ Soft Glow */
.glow {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  z-index: -2;

  background: radial-gradient(circle at 50% 70%, rgba(255,255,255,0.15), transparent 60%);
}

/* 🌟 Stars */
.star {
  position: absolute;
  border-radius: 50%;
  background: white;
  animation: twinkle 3s infinite ease-in-out;
}

.star.small { width: 1px; height: 1px; opacity: 0.6; }
.star.medium { width: 2px; height: 2px; }
.star.big { width: 3px; height: 3px; box-shadow: 0 0 6px white; }

@keyframes twinkle {
  0%, 100% { opacity: 0.2; }
  50% { opacity: 1; }
}

/* 💖 Floating Hearts */
.heart {
  position: fixed;
  bottom: -10px;
  width: 12px;
  height: 12px;
  background: #ff8fa3;
  transform: rotate(45deg);
  animation: floatUp 8s linear infinite;
}

.heart::before,
.heart::after {
  content: "";
  position: absolute;
  width: 12px;
  height: 12px;
  background: #ff8fa3;
  border-radius: 50%;
}

.heart::before { top: -6px; left: 0; }
.heart::after { left: -6px; top: 0; }

@keyframes floatUp {
  0% { transform: translateY(0) rotate(45deg); opacity: 0; }
  10% { opacity: 1; }
  100% { transform: translateY(-110vh) rotate(45deg); opacity: 0; }
}

/* 💖 Heading */
h1 {
  margin-top: 120px;
  font-size: 2.8rem;
  font-weight: 600;
  letter-spacing: 1px;
  text-shadow: 0 0 20px rgba(255,255,255,0.9);
}

/* 💖 Cards */
.card {
  background: rgba(60, 60, 70, 0.6);
  backdrop-filter: blur(15px);
  padding: 22px;
  border-radius: 20px;
  margin: 20px auto;
  max-width: 420px;
}

/* 💖 Buttons */
button {
  padding: 10px 16px;
  border: none;
  background: #ff9eb5;
  color: black;
  border-radius: 10px;
  margin: 10px;
  cursor: pointer;
  font-weight: 500;
}

.hidden {
  display: none;
  margin-top: 10px;
}

</style>
</head>

<body>

<div class="sky"></div>
<div class="glow"></div>

<!-- 🌟 Stars -->
<div class="star small" style="top:5%; left:10%;"></div>
<div class="star medium" style="top:15%; left:25%;"></div>
<div class="star big" style="top:20%; left:70%;"></div>
<div class="star small" style="top:30%; left:50%;"></div>
<div class="star medium" style="top:40%; left:80%;"></div>
<div class="star small" style="top:60%; left:20%;"></div>
<div class="star big" style="top:70%; left:60%;"></div>
<div class="star medium" style="top:80%; left:35%;"></div>

<!-- 💖 Hearts -->
<div class="heart" style="left:10%; animation-delay:0s;"></div>
<div class="heart" style="left:30%; animation-delay:2s;"></div>
<div class="heart" style="left:50%; animation-delay:4s;"></div>
<div class="heart" style="left:70%; animation-delay:1s;"></div>
<div class="heart" style="left:90%; animation-delay:3s;"></div>

<!-- 💖 Heading -->
<h1>Hey you.</h1>

<div class="card">
  <p>I made this for you… don’t rush it.</p>
</div>

<div class="card">
  <button onclick="show('one')">Click me</button>
  <p id="one" class="hidden">You’re more special than you realize.</p>

  <button onclick="show('two')">And this</button>
  <p id="two" class="hidden">I really love having you in my life.</p>

  <button onclick="show('three')">Last one</button>
  <p id="three" class="hidden">Happy Birthday ❤️</p>
</div>

<script>
function show(id) {
  document.getElementById(id).style.display = "block";
}
</script>

</body>
</html>
