<!DOCTYPE html>
<html>
<head>
<title>For You ❤️</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  text-align: center;
  color: white;
  overflow: hidden;
}

/* 🌌 Anime Sky Background */
.sky {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  z-index: -3;
  overflow: hidden;

  background: linear-gradient(
    to bottom,
    #0b1a3a 0%,
    #1f3c73 30%,
    #4a5fa3 55%,
    #ff9eb5 80%,
    #ffd6a5 100%
  );
}

/* ✨ Light streaks */
.streak {
  position: absolute;
  width: 2px;
  height: 300px;
  background: linear-gradient(to bottom, rgba(255,255,255,0.9), transparent);
  opacity: 0.7;
  transform: rotate(20deg);
  animation: streakMove 6s linear infinite;
}

.streak:nth-child(1) { left: 30%; top: -10%; animation-delay: 0s; }
.streak:nth-child(2) { left: 50%; top: -20%; height: 400px; animation-delay: 2s; }
.streak:nth-child(3) { left: 70%; top: -15%; height: 350px; animation-delay: 4s; }

@keyframes streakMove {
  0% { transform: translateY(0) rotate(20deg); opacity: 0; }
  20% { opacity: 1; }
  100% { transform: translateY(120vh) rotate(20deg); opacity: 0; }
}

/* 🌟 Stars */
.star {
  position: absolute;
  width: 2px;
  height: 2px;
  background: white;
  border-radius: 50%;
  opacity: 0.8;
  animation: twinkle 3s infinite ease-in-out;
}

@keyframes twinkle {
  0%, 100% { opacity: 0.2; }
  50% { opacity: 1; }
}

/* 💖 Content */
h1 {
  margin-top: 100px;
  font-size: 2.5rem;
  text-shadow: 0 0 15px rgba(255,255,255,0.7);
}

.card {
  background: rgba(0,0,0,0.3);
  backdrop-filter: blur(10px);
  padding: 20px;
  border-radius: 15px;
  margin: 20px auto;
  max-width: 400px;
}

button {
  padding: 10px 15px;
  border: none;
  background: #ff9eb5;
  color: black;
  border-radius: 8px;
  margin: 10px;
  cursor: pointer;
}

.hidden {
  display: none;
  margin-top: 10px;
}
</style>
</head>

<body>

<div class="sky">
  <div class="streak"></div>
  <div class="streak"></div>
  <div class="streak"></div>

  <div class="star" style="top:10%; left:20%;"></div>
  <div class="star" style="top:25%; left:60%;"></div>
  <div class="star" style="top:40%; left:80%;"></div>
  <div class="star" style="top:15%; left:75%;"></div>
  <div class="star" style="top:50%; left:30%;"></div>
</div>

<h1>Hey You ❤️</h1>

<div class="card">
  <p>I made this for you… don’t rush it.</p>
</div>

<div class="card">
  <button onclick="show('one')">Click me</button>
  <p id="one" class="hidden">You’re more special than you realize.</p>

  <button onclick="show('two')">And this</button>
  <p id="two" class="hidden">I really love having you in my life.</p>

  <button onclick="show('three')">Last one</button>
  <p id="three" class="hidden">Happy Birthday ❤️</p>
</div>

<script>
function show(id) {
  document.getElementById(id).style.display = "block";
}
</script>

</body>
</html>
