<!DOCTYPE html>
<html>
<head>
<title>For You ❤️</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  text-align: center;
  overflow: hidden;
  color: white;
}

/* 🌙 Romantic Gradient Background */
.sky {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  z-index: -3;

  background: linear-gradient(
    to bottom,
    #0b1a3a 0%,     /* deep night blue */
    #1f3c73 30%,    /* blue */
    #4a5fa3 55%,    /* soft purple-blue */
    #ff9eb5 80%,    /* pink horizon */
    #ffd6a5 100%    /* warm sunset glow */
  );
  overflow: hidden;
}

/* ✨ Soft glow */
.glow {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: radial-gradient(circle at 70% 20%, rgba(255,158,181,0.15), transparent 40%);
  z-index: -2;
}

/* 🌟 Stars */
.star {
  position: fixed;
  width: 2px;
  height: 2px;
  background: white;
  border-radius: 50%;
  opacity: 0.8;
  animation: twinkle 3s infinite ease-in-out;
}

@keyframes twinkle {
  0%, 100% { opacity: 0.2; }
  50% { opacity: 1; }
}

/* 💖 Floating hearts */
.heart {
  position: fixed;
  bottom: -10px;
  width: 12px;
  height: 12px;
  background: #ff6b81;
  transform: rotate(45deg);
  animation: floatUp 8s linear infinite;
}

.heart::before,
.heart::after {
  content: "";
  position: absolute;
  width: 12px;
  height: 12px;
  background: #ff6b81;
  border-radius: 50%;
}

.heart::before {
  top: -6px;
  left: 0;
}

.heart::after {
  left: -6px;
  top: 0;
}

@keyframes floatUp {
  0% {
    transform: translateY(0) rotate(45deg);
    opacity: 0;
  }
  10% { opacity: 1; }
  100% {
    transform: translateY(-110vh) rotate(45deg);
    opacity: 0;
  }
}

/* Content */
h1 {
  margin-top: 80px;
  font-size: 2.5rem;
  text-shadow: 0 0 15px rgba(255,255,255,0.6);
}

.card {
  background: rgba(255,255,255,0.1);
  backdrop-filter: blur(10px);
  padding: 20px;
  border-radius: 15px;
  margin: 20px auto;
  max-width: 400px;
}

button {
  padding: 10px 15px;
  border: none;
  background: #ff9eb5;
  color: black;
  border-radius: 8px;
  margin: 10px;
  cursor: pointer;
}

.hidden {
  display: none;
  margin-top: 10px;
}
</style>
</head>

<body>

<div class="sky"></div>
<div class="glow"></div>

<!-- Stars -->
<div class="star" style="top:10%; left:20%;"></div>
<div class="star" style="top:30%; left:70%;"></div>
<div class="star" style="top:60%; left:40%;"></div>
<div class="star" style="top:80%; left:80%;"></div>

<!-- Hearts -->
<div class="heart" style="left:10%; animation-delay:0s;"></div>
<div class="heart" style="left:30%; animation-delay:2s;"></div>
<div class="heart" style="left:50%; animation-delay:4s;"></div>
<div class="heart" style="left:70%; animation-delay:1s;"></div>
<div class="heart" style="left:90%; animation-delay:3s;"></div>

<h1>Hey You ❤️</h1>

<div class="card">
  <p>I made this just for you… don’t rush it.</p>
</div>

<div class="card">
  <button onclick="show('one')">Click me</button>
  <p id="one" class="hidden">You mean a lot more than you think.</p>

  <button onclick="show('two')">And this</button>
  <p id="two" class="hidden">I’m really lucky to have you.</p>

  <button onclick="show('three')">Last one</button>
  <p id="three" class="hidden">Happy Birthday ❤️</p>
</div>

<script>
function show(id) {
  document.getElementById(id).style.display = "block";
}
</script>

</body>
</html>
