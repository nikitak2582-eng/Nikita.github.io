<!DOCTYPE html>
<html>
<head>
<title>For You 🌸</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  text-align: center;
  overflow-x: hidden;
  color: white;
}

/* 🌌 SKY */
.sky {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  z-index: -3;

  background: linear-gradient(
    to bottom,
    #bfe8ff,
    #a8dcff,
    #cfefff,
    #f0fbff
  );
}

/* ☁️ CLOUDS */
.cloud {
  position: absolute;
  width: 200px;
  height: 60px;
  background: white;
  border-radius: 50px;
  opacity: 0.6;
  filter: blur(12px);
  animation: float 120s linear infinite; /* ✅ fixed */
}

/* Cloud puffs */
.cloud::before,
.cloud::after {
  content: "";
  position: absolute;
  background: white;
  width: 100px;
  height: 80px;
  border-radius: 50%;
}

.cloud::before {
  top: -30px;
  left: 30px;
}

.cloud::after {
  top: -20px;
  left: 90px;
}

/* 🎬 Animation */
@keyframes float {
  from { transform: translateX(-200px); }
  to { transform: translateX(120vw); }
}

/* 🌸 Sakura tree */
.sakura {
  position: fixed;
  bottom: 0;
  left: 0;              /* moved to left corner */
  width: 400px;   /* reduced from 450px */
  height: 400px;
  background: url("sakura.png") no-repeat bottom left;
  background-size: contain;
  z-index: -2;
}

/* CONTENT */
h1 {
  margin-top: 60px;
  color: #fff;
  text-shadow: 0 0 10px rgba(255,255,255,0.8);
}

.card {
  background: rgba(0,0,0,0.3);
  backdrop-filter: blur(8px);
  padding: 20px;
  border-radius: 15px;
  margin: 20px auto;
  max-width: 400px;
}

button {
  padding: 10px 15px;
  border: none;
  background: #ff9eb5;
  color: black;
  border-radius: 8px;
  margin: 10px;
  cursor: pointer;
}

.hidden {
  display: none;
  margin-top: 10px;
}

/* 🍃 PETALS */
.petal {
  position: fixed;
  top: -20px;
  width: 12px;
  height: 12px;
  background: #ffb7c5;
  border-radius: 50% 0 50% 0;
  opacity: 0.8;
  animation: fall 10s linear infinite;
}

/* Different starting positions */
.petal:nth-child(1) { left: 10%; animation-delay: 0s; }
.petal:nth-child(2) { left: 25%; animation-delay: 2s; }
.petal:nth-child(3) { left: 40%; animation-delay: 4s; }
.petal:nth-child(4) { left: 60%; animation-delay: 1s; }
.petal:nth-child(5) { left: 80%; animation-delay: 3s; }

/* 🌸 Falling animation */
@keyframes fall {
  0% {
    transform: translateY(0) rotate(0deg);
    opacity: 0;
  }
  10% {
    opacity: 1;
  }
  100% {
    transform: translateY(110vh) rotate(360deg);
    opacity: 0;
  }
}
</style>
</head>

<body>

<!-- 🌌 SKY -->
<div class="sky"></div>

<!-- ☁️ CLOUDS -->
<div class="cloud" style="top:18%; left:5%;"></div>
<div class="cloud" style="top:28%; left:40%; transform: scale(1.3);"></div>
<div class="cloud" style="top:12%; left:70%; transform: scale(0.8);"></div>

<!-- 🌸 SAKURA (YOU WERE MISSING THIS) -->
<div class="sakura"></div>

  <!-- 🍃 FLOATING PETALS (ADD THIS HERE) -->
<div class="petal-container">
  <div class="petal"></div>
  <div class="petal"></div>
  <div class="petal"></div>
  <div class="petal"></div>
  <div class="petal"></div>
</div> 
  
<!-- 💖 CONTENT -->
<h1>Hey You 🌸</h1>

<div class="card">
  <p>This feels like a quiet moment… just us.</p>
</div>

<div class="card">
  <button onclick="show('miss')">When you miss me</button>
  <p id="miss" class="hidden">I’m always right here.</p>

  <button onclick="show('sad')">When you're not okay</button>
  <p id="sad" class="hidden">You don’t have to carry everything alone.</p>

  <button onclick="show('sleep')">When you can’t sleep</button>
  <p id="sleep" class="hidden">Close your eyes… I’m there.</p>
</div>

<script>
function show(id) {
  document.getElementById(id).style.display = "block";
}
</script>
  
</body>
</html>
