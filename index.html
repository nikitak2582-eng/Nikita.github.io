<!DOCTYPE html>
<html>
<head>
<title>For You 🖤</title>

<style>
body {
  background: #0a0a0a;
  color: #e0e0e0;
  font-family: 'Segoe UI', sans-serif;
  text-align: center;
  padding: 40px;
  overflow-x: hidden;
}

/* Glow heading */
h1 {
  font-size: 28px;
  color: #00f7ff;
  text-shadow: 0 0 10px #00f7ff;
  animation: fadeIn 1.5s ease-in;
}

/* Cards */
.card {
  background: #121212;
  padding: 20px;
  border-radius: 15px;
  margin: 20px auto;
  max-width: 400px;
  box-shadow: 0 0 20px rgba(0, 247, 255, 0.1);
  animation: fadeUp 1s ease;
}

/* Buttons */
button {
  padding: 12px 18px;
  border: none;
  background: #111;
  color: #00f7ff;
  border-radius: 8px;
  margin: 10px;
  border: 1px solid #00f7ff;
  transition: 0.3s;
}

button:hover {
  background: #00f7ff;
  color: #000;
  box-shadow: 0 0 10px #00f7ff;
}

/* Hidden text */
.hidden {
  display: none;
  margin-top: 10px;
  color: #aaa;
  animation: fadeIn 1s ease;
}

/* Animations */
@keyframes fadeIn {
  from {opacity: 0;}
  to {opacity: 1;}
}

@keyframes fadeUp {
  from {
    opacity: 0;
    transform: translateY(20px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}
</style>
</head>

<body>

<h1>Hey You ⚡</h1>

<div class="card">
  <p>I know you built something from scratch…  
  so I made something my way.</p>
</div>

<div class="card">
  <button onclick="show('miss')">When you miss me</button>
  <p id="miss" class="hidden">I’m always closer than you think.</p>

  <button onclick="show('sad')">When you're not okay</button>
  <p id="sad" class="hidden">You don’t have to say anything. I understand.</p>

  <button onclick="show('sleep')">When you can’t sleep</button>
  <p id="sleep" class="hidden">Close your eyes… I’m right there.</p>
</div>

<div class="card">
  <p>More unlocking soon...</p>
</div>

<script>
function show(id) {
  document.getElementById(id).style.display = "block";
}
</script>

</body>
</html>
