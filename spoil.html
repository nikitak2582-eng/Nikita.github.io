<!DOCTYPE html>
<html>
<head>
<title>Spoil Me Zone 💖</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600&family=Dancing+Script:wght@500&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(to bottom, #ffe4ec, #ffd6e8, #fbcfe8);
  min-height: 100vh;
  min-width: 100vw;
}

/* HEADER */
.top-banner {
  text-align: center;
  padding: 50px 20px 20px;
}

.top-banner h1 {
  font-family: 'Playfair Display', serif;
  font-size: 3rem;
  color: #b85c8e;
}

.top-banner p {
  font-family: 'Dancing Script', cursive;
  font-size: 1.2rem;
  color: #d17aa8;
}

/* TERMS */
.terms {
  max-width: 700px;
  margin: 10px auto 20px;
  background: rgba(255,255,255,0.5);
  padding: 15px;
  border-radius: 15px;
  font-size: 0.95rem;
  color: #7a4b63;
}

/* BOX */
.container {
  display: flex;
  justify-content: center;
}

.box {
  width: 95%;
  max-width: 720px;
}

/* LETTER */
.letter {
  background: linear-gradient(to bottom, #fff9fb, #fff3f7);
  border-radius: 18px;
  padding: 25px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.2);
  position: relative;
}

.letter::after {
  content: "";
  position: absolute;
  inset: 0;
  border-radius: 18px;
  background: radial-gradient(circle at top left, rgba(255,255,255,0.7), transparent);
  pointer-events: none;
}

.letter-top {
  font-family: 'Dancing Script', cursive;
  font-size: 1.5rem;   /* was 1.4rem */
  color: #d46a92;
}
  
textarea {
  width: 100%;
  height: 140px;
  border: none;
  outline: none;
  background: transparent;
  margin-top: 10px;
  font-family: Georgia;

  /* ✨ slight increase */
  font-size: 1.05rem;
  color: #6a3b52;
}

/* 💌 placeholder (Write your wish...) */
textarea::placeholder {
  font-size: 1.1rem;      /* slightly bigger than text */
  color: #c97aa2;         /* soft romantic pink */
  opacity: 1;
}

/* BUTTON */
button {
  margin-top: 10px;
  padding: 10px 18px;
  border-radius: 20px;
  border: none;
  background: #ff9ac2;
  color: white;
  cursor: pointer;
}

/* NAV (UPDATED ONLY THIS PART) */
.nav {
  display: flex;
  justify-content: center;
  gap: 20px;
  margin-top: 20px;
}

.nav a {
  text-decoration: none;
  color: #b85c8e;
  background: rgba(255, 255, 255, 0.6);
  padding: 8px 14px;
  border-radius: 20px;
  font-size: 0.95rem;
  transition: all 0.2s ease;
}

.nav a:hover {
  background: rgba(255, 255, 255, 0.9);
  transform: scale(1.05);
}

html, body {
  height: 100%;
  overflow: hidden;
}
</style>
</head>

<body>

<div class="top-banner">
  <h1>Spoil Me Zone 💖</h1>
  <p>soft demands only</p>
</div>

<div class="terms">
  💌 You may place wishes here.<br>
  💌 Wishes are subject to review within 30 days.<br>
  💌 Failure to comply may result in penalties (emotional or otherwise).
</div>

<div class="container">
  <div class="box">

    <div class="letter">
      <div class="letter-top">💌 Wish Corner</div>
      <textarea id="wishInput" placeholder="write your wish..."></textarea>
    </div>

    <button onclick="saveWish()">Submit Wish 💗</button>

    <div class="nav">
      <a href="wishes.html">📜 View Wishes</a>
      <a href="index.html">🏠 Home</a>
    </div>

  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import { getDatabase, ref, onValue, update, remove, get } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-database.js";

/* 🔑 CONFIG */
const firebaseConfig = {
  apiKey: "AIzaSyBeuP_d_C8Q8ou_egHFT2tDgpDrNLiYusk",
  authDomain: "dhruv-s-little-lobby.firebaseapp.com",
  databaseURL: "https://dhruv-s-little-lobby-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "dhruv-s-little-lobby",
  storageBucket: "dhruv-s-little-lobby.firebasestorage.app",
  messagingSenderId: "129807376775",
  appId: "1:129807376775:web:4e8d8d227772c0f115b322"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const wishesRef = ref(db, "wishes");
const streakRef = ref(db, "streak");

/* 🔄 REALTIME */
onValue(wishesRef, (snap) => {
  const data = snap.val() || {};
  render(data);
});

onValue(streakRef, (snap) => {
  const s = snap.val() || 0;
  document.getElementById("streakBox").innerHTML =
    "💖 streak: " + s + " wishes emotionally maintained";
});

/* 🧠 RENDER */
function render(data){
  let box = document.getElementById("list");
  box.innerHTML = "";

  Object.entries(data).reverse().forEach(([id, w]) => {

    let d = Math.floor((Date.now() - (w.time||Date.now()))/(1000*60*60*24));

    let div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <div class="wish-text">💌 ${w.text}</div>
      <div class="meta">day ${d}/30 | status: ${w.status || "Pending"}</div>
      <div class="badge">30-day review system</div>

      <div class="check">
        <label>
          <input type="checkbox" ${w.granted ? "checked":""} onchange="grant('${id}')">
          granted 💖
        </label>

        <label>
          <input type="checkbox" ${w.denied ? "checked":""} onchange="deny('${id}')">
          not granted 💔
        </label>
      </div>

      <div class="options">
        <button onclick="penalize('${id}')">add penalty 🎀</button>
        <button onclick="removeWish('${id}')">erase 🗑️</button>
      </div>

      ${w.penalty ? `<div class='penalty'>💸 ${w.penalty}</div>` : ""}
    `;

    box.appendChild(div);
  });
}

/* 💖 ACTIONS */

window.grant = async function(id){
  await update(ref(db, "wishes/" + id), {
    granted: true,
    denied: false,
    status: "Granted 💖"
  });

  const snap = await get(streakRef);
  let s = snap.val() || 0;
  await update(ref(db), { streak: s + 1 });
}

window.deny = async function(id){
  await update(ref(db, "wishes/" + id), {
    denied: true,
    granted: false,
    status: "Not granted 💔"
  });

  await update(ref(db), { streak: 0 });
}

window.penalize = async function(id){
  let p = prompt("cute penalty?");
  if(!p) return;

  await update(ref(db, "wishes/" + id), {
    penalty: p
  });
}

window.removeWish = async function(id){
  if(!confirm("erase this wish?")) return;

  await remove(ref(db, "wishes/" + id));
}
</script>

</body>
</html>
