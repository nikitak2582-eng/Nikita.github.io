<!DOCTYPE html>
<html>
<head>
<title>Spoil Me Zone 💖</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600&family=Dancing+Script:wght@500&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(to bottom, #ffe4ec, #ffd6e8, #fbcfe8);
}

/* HEADER */
.top-banner {
  text-align: center;
  padding: 50px 20px 20px;
}

.top-banner h1 {
  font-family: 'Playfair Display', serif;
  font-size: 3rem;
  color: #b85c8e;
}

.top-banner p {
  font-family: 'Dancing Script', cursive;
  font-size: 1.2rem;
  color: #d17aa8;
}

/* TERMS */
.terms {
  max-width: 700px;
  margin: 10px auto 20px;
  background: rgba(255,255,255,0.5);
  padding: 15px;
  border-radius: 15px;
  font-size: 0.95rem;
  color: #7a4b63;
}

/* BOX */
.container {
  display: flex;
  justify-content: center;
}

.box {
  width: 95%;
  max-width: 720px;
}

/* LETTER */
.letter {
  background: linear-gradient(to bottom, #fff9fb, #fff3f7);
  border-radius: 18px;
  padding: 25px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.2);
  position: relative;
}

.letter::after {
  content: "";
  position: absolute;
  inset: 0;
  border-radius: 18px;
  background: radial-gradient(circle at top left, rgba(255,255,255,0.7), transparent);
  pointer-events: none;
}

.letter-top {
  font-family: 'Dancing Script', cursive;
  font-size: 1.5rem;
  color: #d46a92;
}

textarea {
  width: 100%;
  height: 140px;
  border: none;
  outline: none;
  background: transparent;
  margin-top: 10px;
  font-family: Georgia;
  font-size: 1.05rem;
  color: #6a3b52;
}

textarea::placeholder {
  font-size: 1.1rem;
  color: #c97aa2;
  opacity: 1;
}

/* BUTTON */
button {
  margin-top: 10px;
  padding: 10px 18px;
  border-radius: 20px;
  border: none;
  background: #ff9ac2;
  color: white;
  cursor: pointer;
}

/* NAV */
.nav {
  text-align: center;
  margin-top: 20px;
}

.nav a {
  margin: 0 10px;
}

a {
  text-decoration: none;
  color: #b85c8e;
}
</style>
</head>

<body>

<div class="top-banner">
  <h1>Spoil Me Zone 💖</h1>
  <p>soft demands only</p>
</div>

<div class="terms">
  💌 You may place wishes here.<br>
  💌 Wishes are subject to review within 30 days.<br>
  💌 Failure to comply may result in penalties.
</div>

<div class="container">
  <div class="box">

    <div class="letter">
      <div class="letter-top">💌 Wish Corner</div>
      <textarea id="wishInput" placeholder="write your wish..."></textarea>
    </div>

    <button onclick="saveWish()">Submit Wish 💗</button>

    <div class="nav">
      <a href="wishes.html">📜 View Wishes</a>
      <a href="index.html">🏠 Home</a>
    </div>

  </div>
</div>

<!-- ✅ FIREBASE SCRIPT -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import { getDatabase, ref, push } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyBeuP_d_C8Q8ou_egHFT2tDgpDrNLiYusk",
  authDomain: "dhruv-s-little-lobby.firebaseapp.com",
  databaseURL: "https://dhruv-s-little-lobby-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "dhruv-s-little-lobby",
  storageBucket: "dhruv-s-little-lobby.firebasestorage.app",
  messagingSenderId: "129807376775",
  appId: "1:129807376775:web:4e8d8d227772c0f115b322"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const wishesRef = ref(db, "wishes");

/* ✅ FIXED BUTTON FUNCTION */
window.saveWish = function() {
  let text = document.getElementById("wishInput").value.trim();
  if (!text) return;

  push(wishesRef, {
    text: text,
    status: "Pending",
    penalty: "",
    granted: false,
    denied: false,
    time: Date.now()
  });

  document.getElementById("wishInput").value = "";
}
</script>

</body>
</html>
