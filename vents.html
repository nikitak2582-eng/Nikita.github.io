<!DOCTYPE html>
<html>
<head>
<title>Your Vents 📜</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Cormorant Garamond', serif;
  background: #5a3a2e;
  color: #f5e9dc;
}

/* HEADER */
.header {
  text-align: center;
  padding: 40px;
}

/* CONTAINER */
.container {
  max-width: 700px;
  margin: auto;
  padding: 20px;
}

/* 📜 LETTER VENTS */
.vent {
  background: #fffaf0;
  color: #4b3b2a;
  padding: 18px;
  border-radius: 14px;
  margin-bottom: 20px;
  position: relative;
}

/* date */
.date {
  font-size: 0.8rem;
  opacity: 0.6;
  margin-bottom: 10px;
}

/* DELETE BUTTON */
.delete {
  position: absolute;
  top: 10px;
  right: 10px;
  background: #6b4f3a;
  color: white;
  border: none;
  border-radius: 8px;
  cursor: pointer;
}

/* NAV */
.nav {
  text-align: center;
  margin: 30px;
}

.nav a {
  color: #f5e9dc;
  text-decoration: none;
  margin: 0 10px;
}
</style>
</head>

<body>

<div class="header">
  <h1>Your Vents 📜</h1>
</div>

<div class="container" id="ventList"></div>

<div class="nav">
  <a href="venting.html">← Back</a>
</div>

<script>
let vents = JSON.parse(localStorage.getItem("vents")) || [];
let container = document.getElementById("ventList");

function render() {
  container.innerHTML = "";

  if (vents.length === 0) {
    container.innerHTML = "<p>No vents yet</p>";
    return;
  }

  vents.forEach((v, index) => {
    let div = document.createElement("div");
    div.className = "vent";

    div.innerHTML = `
      <button class="delete" onclick="deleteVent(${index})">Erase</button>
      <div class="date">${v.date}</div>
      <strong>Dear You,</strong><br><br>
      ${v.content}
      <br><br><em>— i hear you</em>
    `;

    container.appendChild(div);
  });
}

function deleteVent(index) {
  vents.splice(index, 1);
  localStorage.setItem("vents", JSON.stringify(vents));
  render();
}

render();
</script>

</body>
</html>
