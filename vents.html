<!DOCTYPE html>
<html>
<head>
<title>Your Vents 📜</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: #0a1124;
  color: white;
  padding: 20px;
}

h1 {
  text-align: center;
}

.vent {
  background: rgba(255,255,255,0.08);
  padding: 15px;
  border-radius: 15px;
  margin-bottom: 15px;
  position: relative;
}

.delete-btn {
  position: absolute;
  top: 10px;
  right: 10px;
  background: transparent;
  border: none;
  color: #ff9aa2;
  cursor: pointer;
}

.time {
  font-size: 0.8rem;
  color: #aaa;
  text-align: right;
}

.back {
  text-align: center;
  margin-top: 20px;
}

a {
  color: #a5b4ff;
  text-decoration: none;
}
</style>
</head>

<body>

<h1>Your Vents 📜</h1>

<div id="container"></div>

<div class="back">
  <a href="venting.html">← Back</a>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import { getDatabase, ref, onValue, remove } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyBeuP_d_C8Q8ou_egHFT2tDgpDrNLiYusk",
  authDomain: "dhruv-s-little-lobby.firebaseapp.com",
  databaseURL: "https://dhruv-s-little-lobby-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "dhruv-s-little-lobby",
  storageBucket: "dhruv-s-little-lobby.firebasestorage.app",
  messagingSenderId: "129807376775",
  appId: "1:129807376775:web:4e8d8d227772c0f115b322"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const ventsRef = ref(db, "vents");

let container = document.getElementById("container");

/* 🔄 LIVE LOAD */
onValue(ventsRef, (snap)=>{
  const data = snap.val();

  container.innerHTML = "";

  if (!data) {
    container.innerHTML = "<p>No vents yet...</p>";
    return;
  }

  Object.entries(data).reverse().forEach(([id, v]) => {
    let div = document.createElement("div");
    div.className = "vent";

    div.innerHTML = `
      <button class="delete-btn" onclick="del('${id}')">✖</button>
      <div>${v.text}</div>
      <div class="time">${new Date(v.time).toLocaleString()}</div>
    `;

    container.appendChild(div);
  });
});

/* ❌ DELETE */
window.del = (id)=>{
  remove(ref(db, "vents/" + id));
}
</script>

</body>
</html>
