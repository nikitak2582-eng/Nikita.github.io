<!DOCTYPE html>
<html>
<head>
<title>Your Vents 📜</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: #0a1124;
  color: white;
  padding: 20px;
}

h1 {
  text-align: center;
}

.vent {
  background: rgba(255,255,255,0.08);
  padding: 15px;
  border-radius: 15px;
  margin-bottom: 15px;
  line-height: 1.5;
}

.back {
  text-align: center;
  margin-top: 20px;
}

a {
  color: #a5b4ff;
  text-decoration: none;
}
</style>
</head>

<body>

<h1>Your Vents 📜</h1>

<div id="ventsContainer"></div>

<div class="back">
  <a href="venting.html">← Back</a>
</div>

<script>
let vents = JSON.parse(localStorage.getItem("vents")) || [];

let container = document.getElementById("ventsContainer");

if (vents.length === 0) {
  container.innerHTML = "<p>No vents yet...</p>";
} else {
  vents.forEach(v => {
    let div = document.createElement("div");
    div.className = "vent";
    div.textContent = v;
    container.appendChild(div);
  });
}
</script>

</body>
</html>
