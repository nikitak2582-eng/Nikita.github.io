<!DOCTYPE html>
<html>
<head>
<title>Venting Machine 💭</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
html, body {
  margin: 0;
  padding: 0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(to bottom, #1f1c2c, #928dab);
  color: white;
  overflow-x: hidden;
}

/* HEADER */
.header {
  text-align: center;
  padding: 40px 20px 20px;
}

.header h1 {
  margin: 0;
  font-size: 2.2rem;
}

.header p {
  opacity: 0.8;
}

/* BOX */
.container {
  display: flex;
  justify-content: center;
  padding: 40px 20px;
}

.box {
  width: 90%;
  max-width: 600px;
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(12px);
  border-radius: 20px;
  padding: 20px;
}

/* TEXTAREA */
textarea {
  width: 100%;
  height: 200px;
  border: none;
  outline: none;
  resize: none;
  padding: 15px;
  border-radius: 12px;
  font-size: 1rem;
  font-family: inherit;
}

/* BUTTON */
button {
  margin-top: 15px;
  padding: 10px 18px;
  border: none;
  border-radius: 12px;
  cursor: pointer;
  background: #ff8fab;
  color: white;
  font-size: 1rem;
  transition: 0.2s;
}

button:hover {
  transform: scale(1.05);
}

/* HOME */
.home {
  text-align: center;
  margin: 30px 0;
}

.home a {
  color: white;
  text-decoration: none;
  opacity: 0.8;
}
</style>
</head>

<body>

<div class="header">
  <h1>Venting Machine 💭</h1>
  <p>say what you can’t say out loud</p>
</div>

<div class="container">
  <div class="box">
    <textarea id="vent" placeholder="write everything here..."></textarea>
    <button onclick="saveVent()">Save Vent</button>
  </div>
</div>

<div class="home">
  <a href="index.html">🏠 Home</a>
</div>

<script>
function saveVent() {
  let text = document.getElementById("vent").value;

  if (text.trim() === "") {
    alert("Nothing to save 💭");
    return;
  }

  localStorage.setItem("vent", text);
  alert("Saved safely 💾");
}
</script>

</body>
</html>
