<!DOCTYPE html> 
<html>
<head>
<title>Venting Machine 💭</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&display=swap" rel="stylesheet">

<style>
html, body {
  margin: 0;
  padding: 0;
  font-family: 'Cormorant Garamond', serif;
}

/* 🤎 GLOSSY WENGE BACKGROUND */
body {
  background:
    linear-gradient(to bottom, rgba(255,255,255,0.08), transparent 40%),
    linear-gradient(to bottom, #5a3a2e, #4a2f25);
  min-height: 100vh;
}

/* ✨ MINIMAL TOP STRIP */
.banner {
  text-align: center;
  padding: 25px 15px 15px;
  color: #f5e9dc;

  background: linear-gradient(
    to bottom,
    rgba(0,0,0,0.25),
    rgba(0,0,0,0.05),
    transparent
  );
}

.banner h1 {
  margin: 0;
  font-size: 2rem;
}

.banner p {
  margin-top: 5px;
  font-size: 0.9rem;
  opacity: 0.75;
}

/* CONTAINER */
.container {
  display: flex;
  justify-content: center;
  padding: 20px;
}

/* BOX */
.box {
  width: 92%;
  max-width: 650px;
  background: rgba(255,255,255,0.08);
  border-radius: 20px;
  padding: 20px;

  box-shadow: 
    inset 0 1px 2px rgba(255,255,255,0.1),
    0 10px 25px rgba(0,0,0,0.3);
}

/* 📜 LETTER */
.letter {
  background: #fffaf0;
  border-radius: 18px;
  padding: 22px 18px;
  position: relative;
  overflow: hidden; /* important */
}

/* FIXED overlay */
.letter::before {
  content: "";
  position: absolute;
  inset: 0;
  background: repeating-linear-gradient(
    to bottom,
    transparent,
    transparent 30px,
    rgba(0,0,0,0.05) 31px
  );
  border-radius: 18px;

  pointer-events: none; /* 🔥 KEY FIX */
  z-index: 0;
}

/* make content above overlay */
.letter * {
  position: relative;
  z-index: 1;
}

.letter-top {
  color: #5a4634;
  margin-bottom: 10px;
}

textarea {
  width: 100%;
  height: 220px;
  border: none;
  outline: none;
  background: transparent;
  font-size: 1.1rem;
  color: #4b3b2a;
  line-height: 1.6;
  resize: none;
}

textarea::placeholder {
  color: rgba(75,59,42,0.5);
}

.letter-bottom {
  text-align: right;
  margin-top: 10px;
  color: #6b5642;
}

/* BUTTON */
button {
  margin-top: 15px;
  padding: 10px 18px;
  border: none;
  border-radius: 12px;
  background: #6b4f3a;
  color: white;
  cursor: pointer;
  transition: 0.2s;
}

button:hover {
  transform: scale(1.05);
}

/* NAV */
.nav {
  text-align: center;
  margin-top: 20px;
}

.nav a {
  color: #f5e9dc;
  text-decoration: none;
}

/* 🏠 HOME BUTTON */
.home {
  text-align: center;
  margin: 40px 0 30px;
}

.home a {
  text-decoration: none;
  color: #f5e9dc;
  opacity: 0.85;
  font-size: 0.95rem;
}
</style>
</head>

<body>

<div class="banner">
  <h1>Venting Machine 💭</h1>
  <p>leave it here… you don’t have to carry it</p>
</div>

<div class="container">
  <div class="box">

    <div class="letter">
      <div class="letter-top">Dear You,</div>

      <textarea id="ventInput" placeholder="write it all here..."></textarea>

      <div class="letter-bottom">— i hear you</div>
    </div>

    <button id="saveBtn">Let it rest</button>

    <div class="nav">
      <a href="vents.html">📜 View All Vents</a>
    </div>

  </div>
</div>

<div class="home">
  <a href="index.html">🏠 Home</a>
</div>

<script>
document.getElementById("saveBtn").addEventListener("click", function() {
  let text = document.getElementById("ventInput").value.trim();
  if (!text) return;

  let vents = JSON.parse(localStorage.getItem("vents")) || [];

  let entry = {
    content: text,
    date: new Date().toLocaleString()
  };

  vents.unshift(entry);
  localStorage.setItem("vents", JSON.stringify(vents));

  window.location.href = "vents.html";
});
</script>

</body>
</html>
