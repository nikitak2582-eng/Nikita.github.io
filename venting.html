<!DOCTYPE html>
<html>
<head>
<title>Venting Machine 💭</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
html, body {
  margin: 0;
  padding: 0;
  font-family: 'Segoe UI', sans-serif;
  color: white;
  overflow-x: hidden;
}

/* 🌅 GRADIENT */
body {
  background: linear-gradient(to bottom, #0f2a52, #3c4f8a, #d98ca3, #f6c29a);
  min-height: 100vh;
}

/* HEADER */
.header {
  text-align: center;
  padding: 40px 20px 10px;
}

.header h1 {
  margin: 0;
  font-size: 2.2rem;
}

.header p {
  opacity: 0.85;
}

/* CONTAINER */
.container {
  display: flex;
  justify-content: center;
  padding: 20px;
}

.box {
  width: 90%;
  max-width: 600px;
  background: rgba(0,0,0,0.25);
  backdrop-filter: blur(15px);
  border-radius: 20px;
  padding: 20px;
}

/* 📜 LETTER */
.letter {
  background: linear-gradient(to bottom, #fffaf3, #fceee0);
  border-radius: 18px;
  padding: 18px 16px;
  box-shadow: 
    0 10px 25px rgba(0,0,0,0.15),
    inset 0 0 10px rgba(0,0,0,0.05);
  position: relative;
}

/* paper lines */
.letter::before {
  content: "";
  position: absolute;
  inset: 0;
  background: repeating-linear-gradient(
    to bottom,
    transparent,
    transparent 28px,
    rgba(0,0,0,0.04) 29px
  );
  border-radius: 18px;
  pointer-events: none;
}

/* top text */
.letter-top {
  font-family: 'Georgia', serif;
  color: #5a4634;
  margin-bottom: 8px;
  font-size: 1rem;
  opacity: 0.8;
}

/* textarea */
textarea {
  width: 100%;
  height: 150px;
  border: none;
  outline: none;
  resize: none;
  background: transparent;

  font-family: 'Georgia', serif;
  font-size: 1rem;
  color: #5a4634;

  line-height: 1.6;
  padding: 5px 0;
}

textarea::placeholder {
  color: rgba(90, 70, 52, 0.5);
  font-style: italic;
}

/* bottom text */
.letter-bottom {
  margin-top: 10px;
  text-align: right;
  font-family: 'Georgia', serif;
  font-size: 0.9rem;
  color: rgba(90, 70, 52, 0.7);
}

/* BUTTON */
button {
  margin-top: 15px;
  padding: 10px 18px;
  border: none;
  border-radius: 15px;
  cursor: pointer;
  background: #ff8fab;
  color: white;
  font-size: 1rem;
  transition: 0.2s;
}

button:hover {
  transform: scale(1.05);
}

/* SAVED VENTS */
.saved {
  margin-top: 25px;
}

.vent {
  background: rgba(255,255,255,0.15);
  padding: 12px;
  border-radius: 12px;
  margin-top: 10px;
  font-size: 0.95rem;
}

/* HOME */
.home {
  text-align: center;
  margin: 30px 0;
}

.home a {
  color: white;
  text-decoration: none;
  opacity: 0.8;
}
</style>
</head>

<body>

<div class="header">
  <h1>Venting Machine 💭</h1>
  <p>leave it here… you don’t have to carry it</p>
</div>

<div class="container">
  <div class="box">

    <div class="letter">
      <div class="letter-top">Dear You,</div>

      <textarea id="ventInput" placeholder="write it all here..."></textarea>

      <div class="letter-bottom">— let it rest</div>
    </div>

    <button onclick="saveVent()">Let it rest</button>

    <div class="saved" id="savedVents"></div>

  </div>
</div>

<div class="home">
  <a href="index.html">🏠 Home</a>
</div>

<script>
function saveVent() {
  let input = document.getElementById("ventInput");
  let text = input.value.trim();

  if (text === "") return;

  let vents = JSON.parse(localStorage.getItem("vents")) || [];
  vents.unshift(text);

  localStorage.setItem("vents", JSON.stringify(vents));

  input.value = "";
  displayVents();
}

function displayVents() {
  let container = document.getElementById("savedVents");
  let vents = JSON.parse(localStorage.getItem("vents")) || [];

  container.innerHTML = "";

  vents.forEach(v => {
    let div = document.createElement("div");
    div.className = "vent";
    div.textContent = v;
    container.appendChild(div);
  });
}

displayVents();
</script>

</body>
</html>
