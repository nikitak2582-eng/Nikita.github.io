<!DOCTYPE html>
<html>
<head>
<title>Venting Machine 💭</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
html, body {
  margin: 0;
  padding: 0;
  font-family: 'Segoe UI', sans-serif;
  overflow-x: hidden;
}

/* 🌌 DREAMY NIGHT SKY (SMOOTH, NO GREEN) */
body {
  background:
    radial-gradient(circle at 20% 30%, rgba(120,130,255,0.2), transparent 40%),
    radial-gradient(circle at 80% 20%, rgba(180,140,255,0.15), transparent 45%),
    radial-gradient(circle at 50% 80%, rgba(90,120,255,0.2), transparent 50%),
    linear-gradient(to bottom, #0a1124, #121a3a, #1b2b5a);

  color: white;
}

/* ✨ LIGHTWEIGHT STARS (NO HEAVY ANIMATION) */
.stars {
  position: fixed;
  inset: 0;
  pointer-events: none;
  background:
    radial-gradient(2px 2px at 20% 30%, white, transparent),
    radial-gradient(1.5px 1.5px at 70% 20%, white, transparent),
    radial-gradient(1.5px 1.5px at 40% 70%, white, transparent),
    radial-gradient(2px 2px at 85% 60%, white, transparent),
    radial-gradient(1px 1px at 60% 40%, white, transparent);
  opacity: 0.7;

  animation: softTwinkle 6s ease-in-out infinite;
}

@keyframes softTwinkle {
  0%, 100% { opacity: 0.6; }
  50% { opacity: 0.9; }
}

/* 💌 TOP */
.top-banner {
  text-align: center;
  padding: 50px 20px 30px;
}

.top-banner h1 {
  margin: 0;
  font-size: 2.5rem;
  text-shadow: 0 4px 20px rgba(120,140,255,0.5);
}

.top-banner p {
  margin-top: 8px;
  color: #d6dcff;
}

/* CONTAINER */
.container {
  display: flex;
  justify-content: center;
  padding: 25px;
}

.box {
  width: 92%;
  max-width: 600px;
}

/* 🌙 LETTER */
.letter {
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(12px);
  border-radius: 22px;
  padding: 22px;

  box-shadow:
    0 15px 40px rgba(0,0,0,0.5),
    inset 0 0 10px rgba(255,255,255,0.1);
}

/* TEXT */
.letter-top {
  color: #ffd6f0;
  margin-bottom: 8px;
  font-family: 'Georgia', serif;
}

textarea {
  width: 100%;
  height: 220px;
  border: none;
  outline: none;
  resize: none;
  background: transparent;

  font-family: 'Georgia', serif;
  font-size: 1rem;
  color: #eef1ff;
  line-height: 1.6;
}

textarea::placeholder {
  color: rgba(230,236,255,0.5);
  font-style: italic;
}

.letter-bottom {
  text-align: right;
  margin-top: 10px;
  color: #b8c2ff;
  font-family: 'Georgia', serif;
}

/* BUTTONS */
.btn-group {
  display: flex;
  gap: 10px;
  margin-top: 15px;
}

button {
  padding: 10px 18px;
  border: none;
  border-radius: 20px;
  cursor: pointer;
}

/* save */
#saveBtn {
  background: linear-gradient(to right, #7c8cff, #a5b4ff);
  color: white;
}

/* erase */
#eraseBtn {
  background: transparent;
  border: 1px solid rgba(255,255,255,0.4);
  color: #d6dcff;
}

button:hover {
  transform: scale(1.05);
}

/* NAV */
.nav {
  text-align: center;
  margin-top: 20px;
}

.nav a {
  margin: 0 10px;
  text-decoration: none;
  color: #d6dcff;
}
</style>
</head>

<body>

<div class="stars"></div>

<div class="top-banner">
  <h1>Venting Machine 💭</h1>
  <p>leave it here… it doesn’t have to stay with you</p>
</div>

<div class="container">
  <div class="box">

    <div class="letter">
      <div class="letter-top">Dear You,</div>

      <textarea id="ventInput" placeholder="write it all here..."></textarea>

      <div class="letter-bottom">— i hear you</div>
    </div>

    <div class="btn-group">
      <button id="saveBtn">Let it rest</button>
      <button id="eraseBtn">Erase</button>
    </div>

    <div class="nav">
      <a href="vents.html">📜 View All</a>
      <a href="index.html">🏠 Home</a>
    </div>

  </div>
</div>

<script>
const input = document.getElementById("ventInput");

/* SAVE */
document.getElementById("saveBtn").addEventListener("click", function() {
  let text = input.value.trim();
  if (text === "") return;

  let vents = JSON.parse(localStorage.getItem("vents")) || [];
  vents.unshift(text);
  localStorage.setItem("vents", JSON.stringify(vents));

  input.value = "";
});

/* ERASE (only clears box, no data loss) */
document.getElementById("eraseBtn").addEventListener("click", function() {
  input.value = "";
});
</script>

</body>
</html>
