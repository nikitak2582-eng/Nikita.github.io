<!DOCTYPE html>
<html>
<head>
<title>Venting Machine 💭</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
html, body {
  margin: 0;
  padding: 0;
  height: 100%;
  overflow-x: hidden;
  overscroll-behavior: none;
}

html {
  background: #0a1124;
}

body {
  background:
    radial-gradient(circle at 20% 30%, rgba(120,130,255,0.2), transparent 40%),
    radial-gradient(circle at 80% 20%, rgba(180,140,255,0.15), transparent 45%),
    radial-gradient(circle at 50% 80%, rgba(90,120,255,0.2), transparent 50%),
    linear-gradient(to bottom, #0a1124, #121a3a, #1b2b5a);

  font-family: 'Segoe UI', sans-serif;
  color: white;
}

/* stars */
.stars {
  position: fixed;
  inset: 0;
  pointer-events: none;
  background:
    radial-gradient(2px 2px at 20% 30%, white, transparent),
    radial-gradient(1.5px 1.5px at 70% 20%, white, transparent),
    radial-gradient(1.5px 1.5px at 40% 70%, white, transparent);
  opacity: 0.7;
}

/* header */
.top-banner {
  text-align: center;
  padding: 50px 20px 30px;
}

.container {
  display: flex;
  justify-content: center;
  padding: 25px;
}

.box {
  width: 92%;
  max-width: 600px;
}

/* letter */
.letter {
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(12px);
  border-radius: 22px;
  padding: 22px;
}

textarea {
  width: 100%;
  height: 220px;
  border: none;
  outline: none;
  resize: none;
  background: transparent;
  color: #eef1ff;
  font-size: 1rem;
}

/* buttons */
.btn-group {
  display: flex;
  gap: 10px;
  margin-top: 15px;
}

button {
  padding: 10px 18px;
  border-radius: 20px;
  border: none;
  cursor: pointer;
}

#saveBtn {
  background: #7c8cff;
  color: white;
}

#eraseBtn {
  background: transparent;
  border: 1px solid #ccc;
  color: #ddd;
}

/* nav */
.nav {
  text-align: center;
  margin-top: 20px;
}

.nav a {
  color: #a5b4ff;
  text-decoration: none;
}
</style>
</head>

<body>

<div class="stars"></div>

<div class="top-banner">
  <h1>Venting Machine 💭</h1>
  <p>leave it here… it doesn’t have to stay with you</p>
</div>

<div class="container">
  <div class="box">

    <div class="letter">
      <textarea id="ventInput" placeholder="write it all here..."></textarea>
    </div>

    <div class="btn-group">
      <button id="saveBtn">Let it rest</button>
      <button id="eraseBtn">Erase</button>
    </div>

    <div class="nav">
      <a href="vents.html">📜 View All</a>
    </div>

  </div>
</div>

<script>
const input = document.getElementById("ventInput");

/* SAVE WITH TIMESTAMP */
document.getElementById("saveBtn").addEventListener("click", function() {
  let text = input.value.trim();
  if (text === "") return;

  let vents = JSON.parse(localStorage.getItem("vents")) || [];

  let entry = {
    text: text,
    time: new Date().toLocaleString()
  };

  vents.unshift(entry);

  localStorage.setItem("vents", JSON.stringify(vents));

  input.value = "";
});

/* ERASE */
document.getElementById("eraseBtn").addEventListener("click", function() {
  input.value = "";
});
</script>

</body>
</html>
