<!DOCTYPE html>
<html>
<head>
<title>Venting Machine 💭</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
/* 🚫 FIX SCROLL GLITCH */
html, body {
  margin: 0;
  padding: 0;
  height: 100%;
  overflow-x: hidden;
  overscroll-behavior: none;
}

html {
  background: #0a1124;
}

/* 🌌 DREAMY SKY */
body {
  background:
    radial-gradient(circle at 20% 30%, rgba(120,130,255,0.25), transparent 40%),
    radial-gradient(circle at 80% 20%, rgba(180,140,255,0.2), transparent 45%),
    radial-gradient(circle at 50% 80%, rgba(90,120,255,0.25), transparent 50%),
    linear-gradient(to bottom, #0a1124, #121a3a, #1b2b5a);

  font-family: 'Segoe UI', sans-serif;
  color: white;
}

/* ⭐ STARS (MORE + BRIGHTER) */
.stars,
.stars::after {
  content: "";
  position: fixed;
  inset: 0;
  pointer-events: none;
}

/* layer 1 */
.stars {
  background:
    radial-gradient(2px 2px at 10% 20%, white, transparent),
    radial-gradient(2px 2px at 30% 40%, white, transparent),
    radial-gradient(1.5px 1.5px at 50% 10%, white, transparent),
    radial-gradient(2px 2px at 70% 30%, white, transparent),
    radial-gradient(1.5px 1.5px at 90% 50%, white, transparent),
    radial-gradient(2px 2px at 20% 80%, white, transparent),
    radial-gradient(1.5px 1.5px at 60% 70%, white, transparent);

  opacity: 0.9;
  animation: twinkle 5s ease-in-out infinite;
}

/* layer 2 */
.stars::after {
  background:
    radial-gradient(1px 1px at 15% 60%, white, transparent),
    radial-gradient(1.5px 1.5px at 35% 75%, white, transparent),
    radial-gradient(1px 1px at 55% 50%, white, transparent),
    radial-gradient(1.5px 1.5px at 75% 85%, white, transparent),
    radial-gradient(1px 1px at 85% 25%, white, transparent);

  opacity: 0.7;
  animation: twinkle 7s ease-in-out infinite;
}

@keyframes twinkle {
  0%,100% { opacity: 0.6; }
  50% { opacity: 1; }
}

/* 💌 HEADER */
.top-banner {
  text-align: center;
  padding: 50px 20px 30px;
}

.top-banner h1 {
  margin: 0;
  font-size: 2.5rem;
  text-shadow: 0 4px 20px rgba(120,140,255,0.6);
}

.top-banner p {
  color: #d6dcff;
}

/* 📦 LAYOUT */
.container {
  display: flex;
  justify-content: center;
  padding: 25px;
}

.box {
  width: 92%;
  max-width: 600px;
}

/* 💌 LETTER (CUTE) */
.letter {
  background: linear-gradient(to bottom, #fff9fb, #fff3f7);
  border-radius: 18px;
  padding: 25px;

  box-shadow:
    0 12px 35px rgba(0,0,0,0.4),
    inset 0 0 8px rgba(255,255,255,0.8);

  position: relative;
}

.letter::after {
  content: "";
  position: absolute;
  inset: 0;
  border-radius: 18px;
  background: radial-gradient(circle at top left, rgba(255,255,255,0.7), transparent);
}

/* text */
.letter-top {
  font-family: 'Georgia', serif;
  color: #d46a92;
  margin-bottom: 10px;
}

textarea {
  width: 100%;
  height: 240px;
  border: none;
  outline: none;
  resize: none;
  background: transparent;

  font-family: 'Georgia', serif;
  font-size: 1rem;
  color: #5a3d4a;
  line-height: 1.7;
}

textarea::placeholder {
  color: rgba(90,61,74,0.5);
  font-style: italic;
}

.letter-bottom {
  text-align: right;
  margin-top: 10px;
  font-family: 'Georgia', serif;
  color: #c98aa5;
}

/* 🔘 BUTTONS */
.btn-group {
  display: flex;
  gap: 10px;
  margin-top: 15px;
}

button {
  padding: 10px 18px;
  border-radius: 20px;
  border: none;
  cursor: pointer;
}

#saveBtn {
  background: linear-gradient(to right, #7c8cff, #a5b4ff);
  color: white;
}

#eraseBtn {
  background: transparent;
  border: 1px solid #ccc;
  color: #ddd;
}

button:hover {
  transform: scale(1.05);
}

/* 🔗 NAV */
.nav {
  text-align: center;
  margin-top: 20px;
}

.nav a {
  color: #a5b4ff;
  text-decoration: none;
}
</style>
</head>

<body>

<div class="stars"></div>

<div class="top-banner">
  <h1>Venting Machine 💭</h1>
  <p>leave it here… it doesn’t have to stay with you</p>
</div>

<div class="container">
  <div class="box">

    <div class="letter">
      <div class="letter-top">💌 Dear You,</div>

      <textarea id="ventInput" placeholder="write it all here..."></textarea>

      <div class="letter-bottom">— i hear you</div>
    </div>

    <div class="btn-group">
      <button id="saveBtn">Let it rest</button>
      <button id="eraseBtn">Erase</button>
    </div>

    <div class="nav">
      <a href="vents.html">📜 View All</a>
    </div>

  </div>
</div>

<script>
const input = document.getElementById("ventInput");

/* SAVE WITH TIMESTAMP */
document.getElementById("saveBtn").addEventListener("click", function() {
  let text = input.value.trim();
  if (text === "") return;

  let vents = JSON.parse(localStorage.getItem("vents")) || [];

  let entry = {
    text: text,
    time: new Date().toLocaleString()
  };

  vents.unshift(entry);

  localStorage.setItem("vents", JSON.stringify(vents));

  input.value = "";
});

/* ERASE */
document.getElementById("eraseBtn").addEventListener("click", function() {
  input.value = "";
});
</script>

</body>
</html>
