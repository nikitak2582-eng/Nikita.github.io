<!DOCTYPE html>
<html>
<head>
<title>Your Vents 📜</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  font-family: 'Georgia', serif;
  background: #5a3a2e;
  color: #f5e9dc;
}

/* HEADER */
.header {
  text-align: center;
  padding: 30px;
}

/* CONTAINER */
.container {
  padding: 20px;
  max-width: 700px;
  margin: auto;
}

/* 📜 LETTER STYLE (NOW MORE VISIBLE) */
.vent {
  background: #fffaf0;
  color: #4b3b2a;
  padding: 20px 18px;
  border-radius: 10px;
  margin-bottom: 25px;

  border: 1px solid rgba(0,0,0,0.1);

  box-shadow: 
    0 12px 25px rgba(0,0,0,0.3),
    inset 0 0 10px rgba(0,0,0,0.05);

  position: relative;
  line-height: 1.6;

  transform: rotate(-0.5deg); /* paper feel */
}

/* alternate rotation for stack effect */
.vent:nth-child(even) {
  transform: rotate(0.7deg);
}

/* paper lines */
.vent::before {
  content: "";
  position: absolute;
  inset: 0;
  background: repeating-linear-gradient(
    to bottom,
    transparent,
    transparent 30px,
    rgba(0,0,0,0.05) 31px
  );
  border-radius: 10px;
  pointer-events: none;
}

/* erase button */
.erase {
  margin-top: 12px;
  font-size: 0.8rem;
  color: #8b5e3c;
  cursor: pointer;
  text-align: right;
}

/* EMPTY */
.empty {
  text-align: center;
  opacity: 0.7;
}

/* NAV */
.nav {
  text-align: center;
  margin: 30px;
}

.nav a {
  text-decoration: none;
  color: #f5e9dc;
  margin: 0 12px;
}
</style>
</head>

<body>

<div class="header">
  <h1>Your Vents 📜</h1>
  <p>everything you chose to leave behind</p>
</div>

<div class="container" id="ventList"></div>

<div class="nav">
  <a href="venting.html">← Back</a>
  <a href="index.html">🏠 Home</a>
</div>

<script>
let vents = JSON.parse(localStorage.getItem("vents")) || [];
let container = document.getElementById("ventList");

function renderVents() {
  container.innerHTML = "";

  if (vents.length === 0) {
    container.innerHTML = "<p class='empty'>nothing here yet</p>";
    return;
  }

  vents.forEach((v, index) => {
    let div = document.createElement("div");
    div.className = "vent";

    div.innerHTML = `
      <strong>Dear You,</strong><br><br>
      ${v}
      <br><br>
      <em>— i hear you</em>

      <div class="erase" onclick="eraseVent(${index})">erase</div>
    `;

    container.appendChild(div);
  });
}

function eraseVent(index) {
  vents.splice(index, 1);
  localStorage.setItem("vents", JSON.stringify(vents));
  renderVents();
}

renderVents();
</script>

</body>
</html>
